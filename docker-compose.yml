version: "3.9"

services:
  # ===== 十神核心 API 服务 =====
  tengod-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tengod-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-default-dev-secret-change-in-prod}
      - DB_PATH=/data/knowledge.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - tengod-net

  # ===== PostgreSQL（可选）=====
  postgres:
    image: postgres:16-alpine
    container_name: tengod-postgres
    environment:
      POSTGRES_DB: tengod
      POSTGRES_USER: ${POSTGRES_USER:-tengod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tengod-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tengod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tengod-net
    profiles:
      - with-pg

  # ===== Redis（可选缓存）=====
  redis:
    image: redis:7-alpine
    container_name: tengod-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - tengod-net
    profiles:
      - with-redis

  # ===== Prometheus 监控 =====
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: tengod-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - tengod-net
    profiles:
      - monitoring

networks:
  tengod-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  redis_data:

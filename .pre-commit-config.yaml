# Pre-commit configuration for Claw project
# See https://pre-commit.com for more information

# Minimum version
minimum_pre_commit_version: 2.20.0

# Default language version
default_language_version:
  python: python3.10

# Define hooks
repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: This hook trims trailing whitespace.
      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensures that a file is either empty or ends with one newline.
      - id: check-yaml
        name: Check YAML
        description: This hook checks yaml files for parseable syntax.
      - id: check-added-large-files
        name: Check for added large files
        description: Prevents giant files from being committed.
        args: ['--maxkb=1000']
      - id: check-json
        name: Check JSON
        description: This hook checks json files for parseable syntax.
      - id: check-toml
        name: Check TOML
        description: This hook checks toml files for parseable syntax.
      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Checks for files that contain merge conflict strings.
      - id: debug-statements
        name: Check for debugger statements
        description: Checks for debugger statements and py37+ `breakpoint()` calls.
      - id: detect-private-key
        name: Detect private key
        description: Detects that a private key is not committed.
      - id: check-ast
        name: Check Python AST
        description: This hook simply checks that that files parse as valid python.
      - id: check-case-conflict
        name: Check for case conflicts
        description: Check for files that would conflict in case-insensitive filesystems.
      - id: check-docstring-first
        name: Check docstring is first
        description: Checks a common error of defining a docstring after code.

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        name: Black - Python code formatter
        description: The uncompromising Python code formatter.
        language_version: python3.10
        args: ['--line-length=100']

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort - Python import sorter
        description: A Python utility / library to sort Python imports.
        args: ['--profile=black', '--line-length=100']

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: flake8 - Python linter
        description: This hook runs flake8.
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']
        additional_dependencies:
          - flake8-docstrings>=1.6.0
          - flake8-bugbear>=23.0.0
          - flake8-comprehensions>=3.14.0

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: bandit - Python security linter
        description: A tool designed to find common security issues in Python code.
        args: ['-c', 'pyproject.toml']
        exclude: ^tests/

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.0
    hooks:
      - id: mypy
        name: mypy - Static type checker
        description: Static type checker for Python.
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - types-toml
        args: ['--config-file=pyproject.toml']

  # Python upgrade
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.0
    hooks:
      - id: pyupgrade
        name: pyupgrade - Upgrade Python syntax
        description: Automatically upgrade syntax for newer versions of the language.
        args: ['--py310-plus']

  # Check for common mistakes
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.35.0
    hooks:
      - id: markdownlint
        name: markdownlint - Markdown linter
        description: Check Markdown files and flag style issues.
        args: ['--fix']

  # Jupyter notebook cleaning
  - repo: https://github.com/kynan/nbstripout
    rev: 0.6.1
    hooks:
      - id: nbstripout
        name: nbstripout - Clean Jupyter notebooks
        description: Strip output from Jupyter notebooks.
        types: [jupyter]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false

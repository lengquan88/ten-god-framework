<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五行八卦 · 中华玄学全息罗盘</title>
<style>
:root{--bg:#060612;--panel:#0a0a1e;--border:#1a1a3e;--text:#c8d6e5;--accent:#6366f1;--gold:#f59e0b;--cyan:#22d3ee;--pink:#ec4899;--green:#10b981;--red:#ef4444;--purple:#a855f7;--orange:#f97316;--muted:#475569;--dim:#334155;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh;overflow-x:hidden;overflow-y:auto}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#6366f408 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#ec489908 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#22d3ee04 0%,transparent 50%);z-index:0;pointer-events:none}
.dashboard{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
/* ── Header ── */
.header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--panel);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.header .sub{font-size:0.7rem;color:var(--muted)}
/* ── Tabs ── */
.tabs{display:flex;gap:2px;flex:1;justify-content:center}
.tab-btn{padding:8px 16px;background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer;font-size:0.75rem;border-radius:6px;transition:all 0.3s;white-space:nowrap;font-family:inherit}
.tab-btn:hover{color:var(--text);border-color:var(--dim);background:rgba(255,255,255,0.03)}
.tab-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(99,102,241,0.1);box-shadow:0 0 12px rgba(99,102,241,0.15)}
/* ── Main ── */
.main{flex:1;display:flex;overflow:hidden}
.tab-content{display:none;flex:1;overflow:auto}
.tab-content.active{display:flex;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ── Sidebar ── */
.sidebar{width:260px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;font-size:0.73rem}
.sidebar-title{font-size:0.8rem;font-weight:600;color:var(--accent);padding-bottom:8px;border-bottom:1px solid var(--border)}
.sidebar .info-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(26,26,62,0.5)}
.sidebar .info-row .label{color:var(--muted)}
.sidebar .info-row .val{color:var(--text);text-align:right}
/* ── Canvas area ── */
.canvas-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-width:0}
.canvas-area canvas{display:block}
.tab-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:0.65rem;color:var(--muted);pointer-events:none}
/* ── Shared ── */
.dual-panels{display:flex;gap:0;flex:1}
.dual-panels .half{flex:1;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
.dual-panels .half .label{font-size:0.7rem;color:var(--accent);margin-top:8px}
.toggle-bar{display:flex;gap:6px;flex-wrap:wrap;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:5}
.toggle-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--dim);background:transparent;color:var(--muted);font-size:0.65rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
.toggle-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.15)}
.toggle-btn:hover{color:var(--text)}
/* ── 十神 calculator ── */
.calc-bar{display:flex;gap:8px;align-items:center;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);font-size:0.7rem}
.calc-bar select,.calc-bar button{padding:3px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:inherit;font-size:0.7rem}
.calc-bar button{background:var(--accent);border-color:var(--accent);color:#fff;cursor:pointer}
.calc-bar button:hover{opacity:0.8}
.result-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.result-cell{text-align:center;padding:3px 4px;border-radius:4px;font-size:0.65rem;border:1px solid var(--dim);color:var(--text)}
/* ── Legend inside sidebar ── */
.legend-mini{font-size:0.65rem;line-height:1.8}
.legend-mini .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
</style>
</head>

function $(id){return document.getElementById(id)}
function getCanvas(id){const c=$(id);const r=c.parentElement.getBoundingClientRect();c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;c.style.width=r.width+'px';c.style.height=r.height+'px';return[c,c.getContext('2d'),r.width,r.height]}
function r(cv){return cv.getBoundingClientRect()}

function elemColor(e){return ELEM_COLORS[e]||'#c8d6e5'}
function elemBg(e){return ELEM_COLORS[e]?ELEM_COLORS[e]+'22':'transparent'}

function switchTab(i){
  document.querySelectorAll('.tab-btn').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  document.querySelectorAll('.tab-content').forEach((c,idx)=>c.classList.toggle('active',idx===i));
  setTimeout(()=>renderTab(i),100);
}

let wuxingSelected = null;

function renderTab0(){
  const [cv,ctx,W,H]=getCanvas('cvsWuxing');
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.38,R2=R*0.62,R3=R*0.32;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  // Glow
  const grd=ctx.createRadialGradient(cx,cy,R*0.1,cx,cy,R*1.2);
  grd.addColorStop(0,'rgba(99,102,241,0.08)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // Generation ring - gold glowing edges
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=WUXING[i].angle*Math.PI/180;
    const x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle='rgba(245,158,11,0.7)';ctx.lineWidth=3;ctx.shadowColor='#f59e0b';ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;

  // Direction arrows on generation
  for(let i=0;i<5;i++){
    const a=WUXING[i].angle*Math.PI/180,a2=WUXING[(i+1)%5].angle*Math.PI/180;
    const mx=cx+(Math.cos(a)+Math.cos(a2))/2*R,my=cy+(Math.sin(a)+Math.sin(a2))/2*R;
    const midA=Math.atan2(Math.sin(a2)-Math.sin(a),Math.cos(a2)-Math.cos(a));
    ctx.save();ctx.translate(mx,my);ctx.rotate(midA);
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-4,-5);ctx.lineTo(-4,5);ctx.closePath();ctx.fill();
    ctx.restore();
    // Label
    const lx=cx+(Math.cos(a)+Math.cos(a2))/2*R*1.12,ly=cy+(Math.sin(a)+Math.sin(a2))/2*R*1.12;
    ctx.fillStyle='rgba(245,158,11,0.8)';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText(SHENG[i],lx,ly);
  }

  // Restriction star - red dashed
  const keOrder=[0,2,4,1,3]; // 木土水火金
  ctx.beginPath();ctx.setLineDash([6,4]);
  for(let i=0;i<5;i++){
    const a=WUXING[keOrder[i]].angle*Math.PI/180;
    const x=cx+Math.cos(a)*R2,y=cy+Math.sin(a)*R2;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle='rgba(239,68,68,0.7)';ctx.lineWidth=2;ctx.shadowColor='#ef444488';ctx.shadowBlur=4;ctx.stroke();ctx.shadowBlur=0;ctx.setLineDash([]);

  // Ke labels
  for(let i=0;i<5;i++){
    const a1=WUXING[keOrder[i]].angle*Math.PI/180,a2=WUXING[keOrder[(i+1)%5]].angle*Math.PI/180;
    const lx=cx+(Math.cos(a1)+Math.cos(a2))/2*R2*0.76,ly=cy+(Math.sin(a1)+Math.sin(a2))/2*R2*0.76;
    ctx.fillStyle='rgba(239,68,68,0.7)';ctx.font='9px "Microsoft YaHei"';
    ctx.fillText(KE[i],lx,ly);
  }

  // Nodes
  for(let i=0;i<5;i++){
    const e=WUXING[i],a=e.angle*Math.PI/180;
    const x=cx+Math.cos(a)*R3,y=cy+Math.sin(a)*R3;
    const sel=wuxingSelected===e.name;

    // Glow
    if(sel){
      ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);
      ctx.fillStyle=e.color+'44';ctx.fill();
    }
    // Circle
    ctx.beginPath();ctx.arc(x,y,sel?26:22,0,Math.PI*2);
    ctx.fillStyle=e.color+'33';ctx.fill();
    ctx.strokeStyle=e.color;ctx.lineWidth=sel?3:2;ctx.stroke();

    // Name
    ctx.fillStyle=e.color;ctx.font='bold 16px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.name,x,y);

    // Detail text on node
    const dtx=cx+Math.cos(a)*(R3+38),dty=cy+Math.sin(a)*(R3+38);
    ctx.fillStyle=e.color;ctx.font='bold 11px "Microsoft YaHei"';
    ctx.fillText(e.name+':'+e.dir+' · '+e.season,dtx,dty-8);
    ctx.fillStyle='#889';ctx.font='9px "Microsoft YaHei"';
    ctx.fillText(e.zang+'/'+e.fu+' | '+e.tri,dtx,dty+8);
  }

  // Center label
  ctx.fillStyle='#556';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('五行·太极',cx,cy);

  ctx.restore();

  // Legend
  let leg='<div>金环: <span style="color:#f59e0b">相生(顺时针)</span> | 红虚线: <span style="color:#ef4444">相克(逆时针)</span></div>';
  WUXING.forEach(e=>{
    leg+=`<div><span class="dot" style="background:${e.color}"></span>${e.name} — ${e.dir} · ${e.season} · ${e.zang}脏${e.fu}腑</div>`;
  });
  $('legendWuxing').innerHTML=leg;

  // Click
  cv.onclick=function(ev){
    const rect=r(cv);const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    let found=null;
    for(let i=0;i<5;i++){
      const a=WUXING[i].angle*Math.PI/180,x=cx+Math.cos(a)*R3,y=cy+Math.sin(a)*R3;
      if(Math.hypot(mx-x,my-y)<30){found=WUXING[i];break}
    }
    wuxingSelected=found?found.name:null;
    renderTab0();
    updateSidebar0(found);
  };
}

function updateSidebar0(e){
  if(!e){$('sidebar0').innerHTML='<div class="sidebar-title">五行详情</div><div style="color:var(--muted);font-size:0.7rem">点击图中节点查看</div>';return}
  const shengI=WUXING.findIndex(w=>w.name===e.name);
  const shengTo=WUXING[(shengI+1)%5].name,keTo=WUXING[(shengI+2)%5].name;
  let html=`<div class="sidebar-title" style="color:${e.color}">${e.name} 详情</div>`;
  html+=`<div class="info-row"><span class="label">颜色</span><span class="val">${e.cn}</span></div>`;
  html+=`<div class="info-row"><span class="label">方位</span><span class="val">${e.dir}</span></div>`;
  html+=`<div class="info-row"><span class="label">季节</span><span class="val">${e.season}</span></div>`;
  html+=`<div class="info-row"><span class="label">脏腑</span><span class="val">${e.zang}脏 · ${e.fu}腑</span></div>`;
  html+=`<div class="info-row"><span class="label">八卦</span><span class="val">${e.tri}</span></div>`;
  html+=`<div class="info-row"><span class="label">河图数</span><span class="val">${e.num.hetu}</span></div>`;
  html+=`<div class="info-row"><span class="label">洛书数</span><span class="val">${e.num.luo}</span></div>`;
  html+=`<div style="margin-top:10px;padding:8px;border-radius:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);font-size:0.65rem;line-height:1.8">`;
  html+=`<div style="color:#10b981">◆ 相生: ${e.name}生${shengTo}</div>`;
  html+=`<div style="color:#ef4444">◆ 相克: ${e.name}克${keTo}</div>`;
  html+=`</div>`;
  $('sidebar0').innerHTML=html;
}

let baguaSelected=null;

function renderBagua(canvasId,type){
  const [cv,ctx,W,H]=getCanvas(canvasId);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.42,R2=R*0.72,R3=R*0.5,R4=R*0.28;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.1);
  grd.addColorStop(0,'rgba(99,102,241,0.04)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  const order=type==='xiantian'?XIANTIAN_ORDER:HOUTIAN_ORDER;
  const dirMap={'南':-90,'北':90,'东':0,'西':180,'东南':-45,'西南':-135,'西北':45,'东北':45};
  const dirAngles={'南':-90,'北':90,'东':0,'西':180,'东南':-135,'西南':135,'西北':45,'东北':-45};

  // Direction labels
  const dirs=[{l:'S南',a:-90},{l:'W西',a:180},{l:'N北',a:90},{l:'E东',a:0}];
  dirs.forEach(d=>{
    const a=d.a*Math.PI/180;
    ctx.fillStyle='#475569';ctx.font='bold 11px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText(d.l,cx+Math.cos(a)*R*1.12,cy+Math.sin(a)*R*1.12);
  });
  // Crosshair
  ctx.strokeStyle='#1a1a3e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();

  // Outer ring
  order.forEach((name,i)=>{
    const bg=BAGUA[name];
    const dir=type==='xiantian'?bg.xiantian.dir:bg.houtian.dir;
    const a=(dirAngles[dir]||0)*Math.PI/180;
    const x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;

    // Ring segment
    ctx.beginPath();ctx.arc(cx,cy,R2,0,Math.PI*2);
    ctx.strokeStyle='#1a1a3e';ctx.lineWidth=1;ctx.stroke();

    // Symbol
    const sel=baguaSelected===name;
    if(sel){
      ctx.beginPath();ctx.arc(x,y,24,0,Math.PI*2);ctx.fillStyle=elemColor(bg.elem)+'33';ctx.fill();
    }
    ctx.fillStyle=elemColor(bg.elem);ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(bg.sym,x,y);

    // Name label at mid ring
    const mx=cx+Math.cos(a)*R3,my=cy+Math.sin(a)*R3;
    const seq=type==='xiantian'?bg.xiantian.seq:bg.houtian.seq;
    ctx.fillStyle=elemColor(bg.elem);ctx.font='bold 10px "Microsoft YaHei"';
    ctx.fillText(name+'(#'+seq+')',mx,my-5);
    ctx.fillStyle='#667';ctx.font='8px "Microsoft YaHei"';
    ctx.fillText(dir+' · '+bg.elem,mx,my+8);
  });

  // Inner: Taiji
  ctx.fillStyle='#475569';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText(type==='xiantian'?'先天八卦':'后天八卦',cx,cy);

  // Connecting opposite pairs for xiantian
  if(type==='xiantian'){
    const pairs=[['乾','坤'],['艮','兑'],['震','巽'],['离','坎']];
    pairs.forEach(([a,b])=>{
      const da1=BAGUA[a].xiantian.dir,da2=BAGUA[b].xiantian.dir;
      const a1=(dirAngles[da1]||0)*Math.PI/180,a2=(dirAngles[da2]||0)*Math.PI/180;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a1)*R*0.55,cy+Math.sin(a1)*R*0.55);
      ctx.lineTo(cx+Math.cos(a2)*R*0.55,cy+Math.sin(a2)*R*0.55);
      ctx.strokeStyle='rgba(99,102,241,0.2)';ctx.setLineDash([3,6]);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    });
  }

  ctx.restore();

  cv.onclick=function(ev){
    const rect=r(cv);const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    let found=null;
    for(let name of order){
      const bg=BAGUA[name],dir=type==='xiantian'?bg.xiantian.dir:bg.houtian.dir;
      const a=(dirAngles[dir]||0)*Math.PI/180,x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
      if(Math.hypot(mx-x,my-y)<30){found=name;break}
    }
    baguaSelected=found;
    renderTab1();
    updateSidebar1(found);
  };
}

function renderTab1(){
  renderBagua('cvsXiantian','xiantian');
  renderBagua('cvsHoutian','houtian');
}

function updateSidebar1(name){
  if(!name){$('sidebar1').innerHTML='<div class="sidebar-title">八卦详情</div><div style="color:var(--muted);font-size:0.7rem">点击卦象查看详情</div>';return}

  h+=`<div style="margin-top:10px;padding:8px;border-radius:6px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);font-size:0.65rem;line-height:1.6">`;

// ═══════════════════════════════════════
//  TAB 2: 天干地支盘
// ═══════════════════════════════════════

let tgToggles={wuhe:true,liuhe:true,sanhe:true,liuchong:true};
let tgHover=null;

function renderTab2(){
  const [cv,ctx,W,H]=getCanvas('cvsTG');
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.43,R2=R*0.78,R3=R*0.56,R4=R*0.35;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  // Toggle bar
  let tgb='';
  for(let[k,v]of Object.entries({wuhe:'五合',liuhe:'六合',sanhe:'三合',liuchong:'六冲'})){
    tgb+=`<button class="toggle-btn ${tgToggles[k]?'on':''}" onclick="tgToggles.${k}=!tgToggles.${k};renderTab2()">${v}</button>`;
  }
  $('tgb').innerHTML=tgb;

  // Outer ring: 12 地支
  DZ.forEach(d=>{
    const a=(d.angle-90)*Math.PI/180;
    const x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
    const hov=tgHover===d.name;

    ctx.beginPath();ctx.arc(x,y,hov?24:20,0,Math.PI*2);
    ctx.fillStyle=elemBg(d.elem);ctx.fill();
    ctx.strokeStyle=elemColor(d.elem);ctx.lineWidth=hov?2:1;ctx.stroke();

    ctx.fillStyle=elemColor(d.elem);ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.name,x,y);

    // Zodiac icon small
    const ax=cx+Math.cos(a)*(R+22),ay=cy+Math.sin(a)*(R+22);
    ctx.fillStyle='#667';ctx.font='8px sans-serif';
    ctx.fillText(d.zodiac.split(' ')[0],ax,ay);
  });

  // Middle ring: 10 天干
  const tgAngles=[0,36,72,108,144,180,216,252,288,324]; // start from east-ish
  TG.forEach((t,i)=>{
    const a=tgAngles[i]*Math.PI/180;
    const x=cx+Math.cos(a)*R2,y=cy+Math.sin(a)*R2;
    ctx.beginPath();ctx.arc(x,y,14,0,Math.PI*2);
    ctx.fillStyle=elemBg(t.elem);ctx.fill();
    ctx.strokeStyle=elemColor(t.elem);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=elemColor(t.elem);ctx.font='bold 11px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.name,x,y);
    // yin-yang indicator
    ctx.fillStyle=t.yy==='阳'?'#f59e0b':'#a855f7';ctx.font='7px "Microsoft YaHei"';
    ctx.fillText(t.yy,x,y+12);
  });

  // 五合 arcs
  if(tgToggles.wuhe){
    TG_WUHE.forEach(([a,b,res])=>{
      const ia=TG.findIndex(t=>t.name===a),ib=TG.findIndex(t=>t.name===b);
      if(ia<0||ib<0)return;
      const aa=tgAngles[ia]*Math.PI/180,ab=tgAngles[ib]*Math.PI/180;
      const xa=cx+Math.cos(aa)*R2,ya=cy+Math.sin(aa)*R2,xb=cx+Math.cos(ab)*R2,yb=cy+Math.sin(ab)*R2;
      const midA=(aa+ab)/2,midR=R2*0.9;
      ctx.beginPath();ctx.arc(cx,cy,midR,Math.min(aa,ab),Math.max(aa,ab));
      ctx.strokeStyle='rgba(245,158,11,0.5)';ctx.lineWidth=1.5;ctx.stroke();
      // Label
      const lx=cx+Math.cos(midA)*midR*1.06,ly=cy+Math.sin(midA)*midR*1.06;
      ctx.fillStyle='rgba(245,158,11,0.8)';ctx.font='7px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText(a+'·'+b+'→'+res,lx,ly);
    });
  }

  // 六合 inner arcs
  if(tgToggles.liuhe){
    DZ_LIUHE.forEach(([a,b,res])=>{
      const da=DZ.find(d=>d.name===a),db=DZ.find(d=>d.name===b);
      if(!da||!db)return;
      const aa=(da.angle-90)*Math.PI/180,ab=(db.angle-90)*Math.PI/180;
      const midR=R3*0.82;
      ctx.beginPath();ctx.arc(cx,cy,midR,Math.min(aa,ab),Math.max(aa,ab));
      ctx.strokeStyle='rgba(34,211,238,0.45)';ctx.lineWidth=1;ctx.stroke();
      const midA=(aa+ab)/2;
      const lx=cx+Math.cos(midA)*midR*1.1,ly=cy+Math.sin(midA)*midR*1.1;
      ctx.fillStyle='rgba(34,211,238,0.7)';ctx.font='6px "Microsoft YaHei"';
      ctx.fillText(a+'·'+b+'→'+res,lx,ly);
    });
  }

  // 三合局 triangles
  if(tgToggles.sanhe){
    DZ_SANHE.forEach(([a,b,c,res])=>{
      const pts=[a,b,c].map(n=>{
        const d=DZ.find(dz=>dz.name===n);if(!d)return null;
        const aa=(d.angle-90)*Math.PI/180;return [cx+Math.cos(aa)*R3,cy+Math.sin(aa)*R3];
      }).filter(Boolean);
      if(pts.length<3)return;
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);ctx.lineTo(pts[1][0],pts[1][1]);ctx.lineTo(pts[2][0],pts[2][1]);ctx.closePath();
      ctx.strokeStyle=elemColor(res)+'44';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=elemColor(res)+'22';ctx.fill();
      const cx2=(pts[0][0]+pts[1][0]+pts[2][0])/3,cy2=(pts[0][1]+pts[1][1]+pts[2][1])/3;
      ctx.fillStyle=elemColor(res);ctx.font='bold 8px "Microsoft YaHei"';
      ctx.fillText(res+'局',cx2,cy2);
    });
  }

  // 六冲 dashed lines
  if(tgToggles.liuchong){
    DZ_LIUCHONG.forEach(([a,b])=>{
      const da=DZ.find(d=>d.name===a),db=DZ.find(d=>d.name===b);
      if(!da||!db)return;
      const aa=(da.angle-90)*Math.PI/180,ab=(db.angle-90)*Math.PI/180;
      ctx.beginPath();ctx.setLineDash([3,5]);
      ctx.moveTo(cx+Math.cos(aa)*R4,cy+Math.sin(aa)*R4);
      ctx.lineTo(cx+Math.cos(ab)*R4,cy+Math.sin(ab)*R4);
      ctx.strokeStyle='rgba(239,68,68,0.35)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    });
  }

  // Inner circle
  ctx.beginPath();ctx.arc(cx,cy,R4*0.5,0,Math.PI*2);
  ctx.strokeStyle='#1a1a3e';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('天干地支',cx,cy);

  ctx.restore();

  cv.onmousemove=function(ev){
    const rect=r(cv);const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    let found=null;
    for(let d of DZ){
      const a=(d.angle-90)*Math.PI/180,x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
      if(Math.hypot(mx-x,my-y)<25){found=d;break}
    }
    if(found!==tgHover){tgHover=found;renderTab2();updateSidebar2(found)}
  };
}

function updateSidebar2(dz){
  if(!dz){$('tghover').textContent='悬停查看地支藏干';$('hiddenStems').innerHTML='';return}
  $('tghover').innerHTML=`<span style="color:${elemColor(dz.elem)}">${dz.name}</span> · ${dz.zodiac} · ${dz.dir} · ${dz.hour}时 · ${dz.elem}(${dz.yy})`;
  let h='';
  dz.hs.forEach(hs=>{
    h+=`<div class="info-row"><span class="label">${hs.t}</span><span class="val" style="color:${elemColor(TG.find(t=>t.name===hs.s)?.elem||'')}">${hs.s}(${hs.p})</span></div>`;
  });
  $('hiddenStems').innerHTML=h;
}

let shiguanSelected=null;
const SHIGUAN_NODES=['正官','七杀','正印','偏印','正财','偏财','比肩','劫财','食神','伤官'];

function getShiguanPositions(W,H){
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.38;
  const positions={};
  SHIGUAN_NODES.forEach((n,i)=>{
    const angle=(i/SHIGUAN_NODES.length)*Math.PI*2-Math.PI/2;
    positions[n]={x:cx+Math.cos(angle)*R,y:cy+Math.sin(angle)*R};
  });
  return positions;
}

function renderTab3(){
  const [cv,ctx,W,H]=getCanvas('cvsShiguan');
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.38;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.3);
  grd.addColorStop(0,'rgba(99,102,241,0.04)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  const pos=getShiguanPositions(W,H);

  // Edges: gen=sheng, res=ke
  const drawnEdges=new Set();
  SHIGUAN_NODES.forEach(src=>{
    const sd=SHIGUAN_DATA[src];if(!sd)return;
    // Generation edges
    (sd.gen||[]).forEach(tgt=>{
      if(!pos[tgt]||drawnEdges.has(`${src}->${tgt}gen`))return;
      drawnEdges.add(`${src}->${tgt}gen`);
      ctx.beginPath();
      ctx.moveTo(pos[src].x,pos[src].y);
      ctx.lineTo(pos[tgt].x,pos[tgt].y);
      ctx.strokeStyle='rgba(16,185,129,0.3)';ctx.lineWidth=1.5;
      ctx.stroke();
      // Arrow
      const mx=(pos[src].x+pos[tgt].x)/2,my=(pos[src].y+pos[tgt].y)/2;
      const ang=Math.atan2(pos[tgt].y-pos[src].y,pos[tgt].x-pos[src].x);
      ctx.save();ctx.translate(mx,my);ctx.rotate(ang);
      ctx.fillStyle='rgba(16,185,129,0.5)';ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(-3,-3);ctx.lineTo(-3,3);ctx.closePath();ctx.fill();
      ctx.restore();
      // Label
      const lx=(pos[src].x+pos[tgt].x)/2+Math.cos(ang+Math.PI/2)*10;
      const ly=(pos[src].y+pos[tgt].y)/2+Math.sin(ang+Math.PI/2)*10;
      ctx.fillStyle='rgba(16,185,129,0.6)';ctx.font='7px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText('生',lx,ly);
    });
    // Restriction edges
    (sd.res||[]).forEach(tgt=>{
      if(!pos[tgt]||drawnEdges.has(`${src}->${tgt}res`))return;
      drawnEdges.add(`${src}->${tgt}res`);
      ctx.beginPath();ctx.setLineDash([3,4]);
      ctx.moveTo(pos[src].x,pos[src].y);
      ctx.lineTo(pos[tgt].x,pos[tgt].y);
      ctx.strokeStyle='rgba(239,68,68,0.35)';ctx.lineWidth=1.5;
      ctx.stroke();ctx.setLineDash([]);
      const mx=(pos[src].x+pos[tgt].x)/2,my=(pos[src].y+pos[tgt].y)/2;
      ctx.fillStyle='rgba(239,68,68,0.5)';ctx.font='7px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText('克',mx,my);
    });
  });

  // Center
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle='rgba(245,158,11,0.1)';ctx.fill();
  ctx.strokeStyle='rgba(245,158,11,0.3)';ctx.stroke();
  ctx.fillStyle='#f59e0b';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('十神',cx,cy);

  // Nodes
  SHIGUAN_NODES.forEach(name=>{
    const p=pos[name],sd=SHIGUAN_DATA[name];
    if(!p||!sd)return;
    const sel=shiguanSelected===name;
    const r=sel?22:16;

    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=sd.color+'33';ctx.fill();
    ctx.strokeStyle=sd.color;ctx.lineWidth=sel?2.5:1.5;ctx.stroke();
    ctx.fillStyle=sd.color;ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(name.substring(0,2),p.x,p.y);
  });

  ctx.restore();

  cv.onclick=function(ev){
    const rect=r(cv);const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
    let found=null;
    for(let name of SHIGUAN_NODES){
      const p=pos[name];if(!p)continue;
      if(Math.hypot(mx-p.x,my-p.y)<24){found=name;break}
    }
    shiguanSelected=found;
    renderTab3();
    updateSidebar3(found);
  };
}

function updateSidebar3(name){
  if(!name){$('shiguanDetail').innerHTML='<div style="color:var(--muted);font-size:0.7rem">点击节点查看详情</div>';return}
  const d=SHIGUAN_DATA[name];
  let h=`<div style="font-weight:600;color:${d.color};margin-bottom:4px">${name} [${d.cat}]</div>`;
  h+=`<div class="info-row"><span class="label">五行关系</span><span class="val">${d.rel}</span></div>`;
  h+=`<div class="info-row"><span class="label">六亲</span><span class="val">${d.six}</span></div>`;
  h+=`<div class="info-row"><span class="label">人物</span><span class="val">${d.person}</span></div>`;
  h+=`<div class="info-row"><span class="label">事业</span><span class="val">${d.career}</span></div>`;
  h+=`<div style="font-size:0.65rem;color:#889;margin-top:6px">性格: ${d.trait}</div>`;
  h+=`<div style="margin-top:6px;font-size:0.6rem">`;
  h+=`<span style="color:#10b981">生:${(d.gen||[]).join(',')}</span> &nbsp;`;
  h+=`<span style="color:#ef4444">克:${(d.res||[]).join(',')}</span><br/>`;
  h+=`<span style="color:#6366f1">被生:${(d.genBy||[]).join(',')}</span> &nbsp;`;
  h+=`<span style="color:#f59e0b">被克:${(d.resBy||[]).join(',')}</span>`;
  h+=`</div>`;
  $('shiguanDetail').innerHTML=h;
}

function calcShiguan(){
  const ri=$('riganSelect').value;
  const map=SHIGUAN_TABLE[ri];
  if(!map)return;
  let res=`<div class="result-grid">`;
  for(let t of TG){
    const sg=map[t.name];
    const d=SHIGUAN_DATA[sg];
    res+=`<div class="result-cell" style="border-color:${d?d.color:'var(--dim)'};color:${d?d.color:'var(--text)'}">${t.name}→${sg||'-'}</div>`;
  }
  res+=`</div>`;
  $('shiguanResult').innerHTML='日干'+ri+': '+res;
}

let hetuLuoshuSelected=null;

function renderHetu(){
  const [cv,ctx,W,H]=getCanvas('cvsHetu');
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.35;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  const dirs={N:{a:-90,dx:0,dy:-1},S:{a:90,dx:0,dy:1},E:{a:0,dx:1,dy:0},W:{a:180,dx:-1,dy:0},C:{a:0,dx:0,dy:0}};

  // Cross
  ctx.strokeStyle='#1a1a3e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();

  // Connections C->each
  for(let[k,d]of Object.entries(dirs)){
    if(k==='C')continue;
    const ex=cx+d.dx*R,ey=cy+d.dy*R;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);
    ctx.strokeStyle=elemColor(HETU[k].elem)+'33';ctx.lineWidth=2;ctx.stroke();
  }

  // Draw each pair
  for(let[k,d]of Object.entries(dirs)){
    const hd=HETU[k],ex=cx+d.dx*R,ey=cy+d.dy*R;
    const offset=k==='C'?0:30;

    // Generation number (inner, yang=white)
    const innerR=k==='C'?0:offset;
    const ix=cx+d.dx*(R-innerR),iy=cy+d.dy*(R-innerR);
    drawDots(ctx,ix,iy,hd.gn,k==='C'?1:0.6,'#ffffff',elemColor(hd.elem));

    // Completion number (outer, yin=dark)
    const ox=cx+d.dx*(R+offset*0.7),oy=cy+d.dy*(R+offset*0.7);
    drawDots(ctx,ox,oy,hd.cn,k==='C'?1:0.6,'#667788',elemColor(hd.elem));

    // Label
    const lx=cx+d.dx*R*1.15,ly=cy+d.dy*R*1.15;
    ctx.fillStyle=elemColor(hd.elem);ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText(`${hd.gn}-${hd.cn} · ${hd.elem}`,lx,ly);
    ctx.fillStyle='#667';ctx.font='8px "Microsoft YaHei"';
    ctx.fillText(hd.pos, lx,ly+14);
  }

  // Center label
  ctx.fillStyle='#f59e0b';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('河图',cx,cy);

  ctx.restore();
}

function drawDots(ctx,x,y,n,scale,fillColor,strokeColor){
  const layouts={
    1:[[0,0]],
    2:[[-1,2],[1,-2]],
    3:[[0,0],[-2,3],[2,-3]],
    4:[[-2,-2],[2,-2],[-2,2],[2,2]],
    5:[[0,0],[-3,-3],[3,-3],[-3,3],[3,3]],
    6:[[-2,0],[2,0],[-4,-3],[0,-3],[4,-3],[-4,3],[0,3],[4,3]].slice(0,6),
    7:[[0,0],[-3,-3],[3,-3],[-3,3],[3,3],[-5,0],[5,0]],
    8:[[-2,-3],[2,-3],[-5,-1],[5,-1],[-2,2],[2,2],[-5,4],[5,4]],
    9:[[0,0],[-3,-3],[3,-3],[-3,3],[3,3],[-5,-1],[5,-1],[-5,2],[5,2]],
    10:[[0,0],[-3,-3],[3,-3],[-3,3],[3,3],[-5,-1],[5,-1],[-5,2],[5,2],[-2,-5],[2,-5]].slice(0,10)
  };
  const pts=layouts[n]||layouts[1];
  const s=scale*5;
  pts.forEach(([dx,dy])=>{
    ctx.beginPath();ctx.arc(x+dx*s,y+dy*s,s*0.8,0,Math.PI*2);
    ctx.fillStyle=fillColor;ctx.fill();
    ctx.strokeStyle=strokeColor;ctx.lineWidth=0.5;ctx.stroke();
  });
}

function renderLuoshu(){
  const [cv,ctx,W,H]=getCanvas('cvsLuoshu');
  const cs=Math.min(W,H)*0.22;
  const ox=(W-cs*3)/2,oy=(H-cs*3)/2;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,cs*2.5);
  grd.addColorStop(0,'rgba(245,158,11,0.05)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // Grid
  for(let row=0;row<3;row++){
    for(let col=0;col<3;col++){
      const n=LUOSHU_GRID[row][col];
      const x=ox+col*cs,y=oy+row*cs;
      const bg=BAGUA[LUOSHU_BAGUA[n]];
      const e=LS_ELEM[n];
      const color=elemColor(e);

      // Cell
      ctx.fillStyle=color+'08';
      ctx.fillRect(x,y,cs,cs);
      ctx.strokeStyle=color+'33';ctx.lineWidth=1.5;
      ctx.strokeRect(x,y,cs,cs);

      // Number
      ctx.fillStyle=color;ctx.font='bold 26px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n,x+cs/2,y+cs/2-6);

      // Element + trigram below
      ctx.fillStyle='#889';ctx.font='9px "Microsoft YaHei"';
      const tgName=LUOSHU_BAGUA[n]==='中宫'?'中宫':LUOSHU_BAGUA[n]+BAGUA[LUOSHU_BAGUA[n]]?.sym||'';
      ctx.fillText(e+' '+tgName,x+cs/2,y+cs/2+16);
    }
  }

  // Magic sum verification
  ctx.fillStyle='#f59e0b';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='left';
  const rows=['4+9+2','3+5+7','8+1+6'],cols=['4+3+8','9+5+1','2+7+6'];
  ctx.fillText('横: '+rows.join(' = ')+' = 15',ox,oy-10);
  ctx.fillText('纵: '+cols.join(' = ')+' = 15',ox,oy-2);
  ctx.fillText('斜: 4+5+6 = 2+5+8 = 15 ✓',ox,oy+cs*3+16);

  ctx.restore();
}

function renderTab4(){
  renderHetu();
  renderLuoshu();
}

let compassAngle=0,compassHover=null,compassDragging=false,compassLastAngle=0;

function renderTab5(){
  const [cv,ctx,W,H]=getCanvas('cvsCompass');
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.44;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);

  // Background glow
  const grd=ctx.createRadialGradient(cx,cy,R*0.1,cx,cy,R*1.05);
  grd.addColorStop(0,'rgba(245,158,11,0.06)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.translate(cx,cy);ctx.rotate(compassAngle);

  // 24山 colors by their element mapping
  const m24colors = M24_ELEMS.map(e=>elemColor(e));

  // Rings from outer to inner:
  const rings=[
    {r:R,segments:24,labels:MOUNTAINS24,colors:m24colors,label:'24山'},
    {r:R*0.88,segments:8,labels:['坎☵','坤☷','震☳','巽☴','乾☰','兑☱','艮☶','离☲'],colors:['#22d3ee','#f59e0b','#10b981','#10b981','#f97316','#f97316','#f59e0b','#ef4444'],label:'八卦'},
    {r:R*0.74,segments:12,labels:DZ.map(d=>d.name),colors:DZ.map(d=>elemColor(d.elem)),label:'地支'},
    {r:R*0.6,segments:10,labels:TG.map(t=>t.name),colors:TG.map(t=>elemColor(t.elem)),label:'天干'},
    {r:R*0.48,segments:5,labels:['水','火','木','金','土'],colors:['#22d3ee','#ef4444','#10b981','#f97316','#f59e0b'],label:'五行'},
  ];

  rings.forEach((ring,ri)=>{
    const innerR = ri < rings.length - 1 ? rings[ri+1].r : 0;
    const segAngle=(Math.PI*2)/ring.segments;
    ring.labels.forEach((label,i)=>{
      const startA=-Math.PI/2+i*segAngle;
      const endA=startA+segAngle;

      // Segment
      ctx.beginPath();
      ctx.moveTo(Math.cos(startA)*innerR,Math.sin(startA)*innerR);
      ctx.arc(0,0,ring.r,startA,endA);
      ctx.arc(0,0,innerR,endA,startA,true);
      ctx.closePath();
      ctx.fillStyle=ring.colors[i]||'#1a1a3e';
      ctx.globalAlpha=0.08;
      ctx.fill();
      ctx.globalAlpha=1;
      ctx.strokeStyle=ring.colors[i]||'#1a1a3e';ctx.lineWidth=0.5;ctx.stroke();

      // Label
      const midA=startA+segAngle/2;
      const lr=(ring.r+innerR)/2;
      ctx.save();ctx.translate(Math.cos(midA)*lr,Math.sin(midA)*lr);ctx.rotate(midA+Math.PI/2);
      ctx.fillStyle=ring.colors[i];ctx.font='bold 8px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText(label,0,0);
      ctx.restore();
    });
  });

  // Crosshair
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-R*1.08);ctx.lineTo(0,R*1.08);ctx.moveTo(-R*1.08,0);ctx.lineTo(R*1.08,0);ctx.stroke();

  // Center
  ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);
  ctx.fillStyle='rgba(245,158,11,0.15)';ctx.fill();
  ctx.strokeStyle='#f59e0b';ctx.stroke();
  ctx.fillStyle='#f59e0b';ctx.font='9px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('太极',0,0);

  ctx.restore();

  // Direction labels fixed
  const fixDirs=[{l:'S',a:-90},{l:'W',a:180},{l:'N',a:90},{l:'E',a:0}];
  fixDirs.forEach(d=>{
    const a=d.a*Math.PI/180;
    ctx.fillStyle='#475569';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.l,cx+Math.cos(a)*R*1.08,cy+Math.sin(a)*R*1.08);
  });

  ctx.restore();

  // Mouse events
  cv.onmousedown=function(ev){
    const rect=r(cv);compassDragging=true;
    compassLastAngle=Math.atan2(ev.clientY-rect.top-cy,ev.clientX-rect.left-cx);
  };
  cv.onmousemove=function(ev){
    const rect=r(cv);
    if(compassDragging){
      const angle=Math.atan2(ev.clientY-rect.top-cy,ev.clientX-rect.left-cx);
      compassAngle+=angle-compassLastAngle;compassLastAngle=angle;renderTab5();
    }else{
      const mx=ev.clientX-rect.left-cx,my=ev.clientY-rect.top-cy;
      const dist=Math.hypot(mx,my);
      let ringIdx=-1,segIdx=-1;
      for(let ri=0;ri<rings.length;ri++){
        const innerR = ri < rings.length-1 ? rings[ri+1].r : 0;
        if(dist>=innerR && dist<=rings[ri].r){ringIdx=ri;break}
      }
      if(ringIdx>=0){
        let angle=Math.atan2(my,mx)+Math.PI/2-compassAngle;
        if(angle<0)angle+=Math.PI*2;
        const seg=Math.floor(angle/(Math.PI*2/rings[ringIdx].segments));
        compassHover={ring:ringIdx,seg:seg%rings[ringIdx].segments};
      }else{compassHover=null}
      updateCompassInfo();
    }
  };
  cv.onmouseup=function(){compassDragging=false};
  cv.onmousewheel=function(ev){ev.preventDefault();compassAngle+=ev.deltaY*0.003;renderTab5()};
  cv.addEventListener('wheel',function(ev){ev.preventDefault();compassAngle+=ev.deltaY*0.003;renderTab5()},{passive:false});
}

function updateCompassInfo(){
  if(!compassHover){$('compassInfo').textContent='悬停罗盘查看详情';return}
  const rings=[MOUNTAINS24,['坎☵','坤☷','震☳','巽☴','乾☰','兑☱','艮☶','离☲'],DZ.map(d=>d.name),TG.map(t=>t.name),['水','火','木','金','土']];
  const ringNames=['24山','八卦','地支','天干','五行'];
  const lbl=rings[compassHover.ring]?.[compassHover.seg];
  const elem = compassHover.ring===0 ? M24_ELEMS[compassHover.seg] : 
              compassHover.ring===1 ? ['水','土','木','木','金','金','土','火'][compassHover.seg] :
              compassHover.ring===2 ? DZ[compassHover.seg]?.elem : 
              compassHover.ring===3 ? TG[compassHover.seg]?.elem : 
              ['水','火','木','金','土'][compassHover.seg];
  $('compassInfo').innerHTML=`<span style="color:var(--accent)">${ringNames[compassHover.ring]} · #${compassHover.seg+1}</span><br/><span style="color:${elemColor(elem)}">${lbl||'—'}</span> · ${elem||''}`;
}

/* ── renderTab6: 八字排盘 ── */
const BZ_GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BZ_ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const BZ_WX={'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
const BZ_YY={'甲':'阳','乙':'阴','丙':'阳','丁':'阴','戊':'阳','己':'阴','庚':'阳','辛':'阴','壬':'阳','癸':'阴'};
const BZ_ZHIGAN={'子':['癸'],'丑':['己','癸','辛'],'寅':['甲','丙','戊'],'卯':['乙'],'辰':['戊','乙','癸'],'巳':['丙','戊','庚'],'午':['丁','己'],'未':['己','丁','乙'],'申':['庚','壬','戊'],'酉':['辛'],'戌':['戊','辛','丁'],'亥':['壬','甲']};
const BZ_SHENG={'木':'火','火':'土','土':'金','金':'水','水':'木'};
const BZ_KE={'木':'土','土':'水','水':'火','火':'金','金':'木'};

function bzGanZhiIndex(y,m,d){
  const base=new Date(1900,0,1);
  const target=new Date(y,m-1,d);
  const diff=Math.floor((target-base)/(1000*60*60*24));
  return ((11+diff)%60+60)%60;
}

function bzYearPillar(y,m,d){
  const isBeforeLC=(m<2)||(m===2&&d<4);
  const effY=isBeforeLC?y-1:y;
  const idx=((effY-4)%60+60)%60;
  return BZ_GAN[idx%10]+BZ_ZHI[idx%12];
}

function bzMonthPillar(y,m,d,yearGan){
  // 节气近似: 立春(2/4),惊蛰(3/6),清明(4/5),立夏(5/6),芒种(6/6),小暑(7/7),立秋(8/8),白露(9/8),寒露(10/8),立冬(11/7),大雪(12/7),小寒(1/6)
  const boundaries=[[1,6,11],[2,4,0],[3,6,1],[4,5,2],[5,6,3],[6,6,4],[7,7,5],[8,8,6],[9,8,7],[10,8,8],[11,7,9],[12,7,10]];
  // 每个区间是[节气月,节气日,月支索引],索引0=寅,1=卯,...11=丑
  let zhiIdx=11;
  for(let i=0;i<12;i++){
    const [bm,bd,bi]=boundaries[i];
    const next=boundaries[(i+1)%12];
    let inRange=false;
    const cur=bm*100+bd, nx=next[0]*100+next[1];
    const today=m*100+d;
    if(cur<=nx) inRange=today>=cur && today<nx;
    else inRange=today>=cur || today<nx;
    if(inRange){zhiIdx=bi;break;}
  }
  // 五虎遁: 甲己起丙寅,乙庚起戊寅,丙辛起庚寅,丁壬起壬寅,戊癸起甲寅
  const firstGan={'甲':'丙','己':'丙','乙':'戊','庚':'戊','丙':'庚','辛':'庚','丁':'壬','壬':'壬','戊':'甲','癸':'甲'}[yearGan];
  const firstGanIdx=BZ_GAN.indexOf(firstGan);
  const monthGan=BZ_GAN[(firstGanIdx+zhiIdx)%10];
  const monthZhi=BZ_ZHI[(zhiIdx+2)%12]; // zhiIdx 0=寅即 BZ_ZHI[2]
  return monthGan+monthZhi;
}

function bzHourPillar(dayGan,hourInt){
  // 确定时支: 23-1 子,1-3 丑,3-5 寅...
  let zhiIdx;
  if(hourInt===23||hourInt===0) zhiIdx=0;
  else zhiIdx=Math.floor((hourInt+1)/2);
  // 五鼠遁: 甲己还加甲,乙庚丙作初,丙辛从戊起,丁壬庚子居,戊癸何方发,壬子是真途
  const firstGan={'甲':'甲','己':'甲','乙':'丙','庚':'丙','丙':'戊','辛':'戊','丁':'庚','壬':'庚','戊':'壬','癸':'壬'}[dayGan];
  const firstGanIdx=BZ_GAN.indexOf(firstGan);
  return BZ_GAN[(firstGanIdx+zhiIdx)%10]+BZ_ZHI[zhiIdx];
}

function bzShigan(dayGan,targetGan){
  const dm=BZ_WX[dayGan],tg=BZ_WX[targetGan];
  const dy=BZ_YY[dayGan],ty=BZ_YY[targetGan];
  const sameY=dy===ty;
  if(dm===tg) return sameY?'比肩':'劫财';
  if(BZ_SHENG[dm]===tg) return sameY?'食神':'伤官';
  if(BZ_KE[dm]===tg) return sameY?'偏财':'正财';
  if(BZ_KE[tg]===dm) return sameY?'七杀':'正官';
  if(BZ_SHENG[tg]===dm) return sameY?'偏印':'正印';
  return '';
}

function renderTab6(){
  const y=parseInt(document.getElementById('bzYear').value);
  const m=parseInt(document.getElementById('bzMonth').value);
  const d=parseInt(document.getElementById('bzDay').value);
  const h=parseInt(document.getElementById('bzHour').value);
  const isMale=parseInt(document.getElementById('bzGender').value)===1;
  const lon=parseFloat(document.getElementById('bzLon').value);

  // 真太阳时
  let trueH=h+Math.round((lon-120)*4/60);
  trueH=((trueH%24)+24)%24;

  const yearP=bzYearPillar(y,m,d);
  const monthP=bzMonthPillar(y,m,d,yearP[0]);
  const dayP=BZ_GAN[bzGanZhiIndex(y,m,d)%10]+BZ_ZHI[bzGanZhiIndex(y,m,d)%12];
  const hourP=bzHourPillar(dayP[0],trueH);

  const pillars=[{label:'年柱',name:yearP},{label:'月柱',name:monthP},{label:'日柱',name:dayP},{label:'时柱',name:hourP}];
  const dayMaster=dayP[0];

  // 五行统计 (天干 + 地支本气)
  const zhiMain={'子':'癸','丑':'己','寅':'甲','卯':'乙','辰':'戊','巳':'丙','午':'丁','未':'己','申':'庚','酉':'辛','戌':'戊','亥':'壬'};
  const wxCnt={'木':0,'火':0,'土':0,'金':0,'水':0};
  pillars.forEach(p=>{wxCnt[BZ_WX[p.name[0]]]++;wxCnt[BZ_WX[zhiMain[p.name[1]]]]++;});
  const total=Object.values(wxCnt).reduce((a,b)=>a+b,0);

  // 十神 (天干)
  const shigans=pillars.map(p=>({label:p.label,name:p.name,shigan:(p.label==='日柱')?`日主 ${dayMaster}`:bzShigan(dayMaster,p.name[0])}));

  // 地支关系
  const branches=pillars.map(p=>p.name[1]);
  const liuHe=[['子','丑'],['寅','亥'],['卯','戌'],['辰','酉'],['巳','申'],['午','未']];
  const liuChong=[['子','午'],['丑','未'],['寅','申'],['卯','酉'],['辰','戌'],['巳','亥']];
  const sanHe=[['申','子','辰'],['亥','卯','未'],['寅','午','戌'],['巳','酉','丑']];
  function hasPair(rel){
    for(const pair of rel){
      if(branches.includes(pair[0])&&branches.includes(pair[1])) return pair.join('+');
    }return '';
  }
  const he=hasPair(liuHe), chong=hasPair(liuChong);
  const sanheResult=[];
  for(const tri of sanHe){
    if(tri.every(z=>branches.includes(z))) sanheResult.push(tri.join('+'));
  }

  // 大运 (简化: 阳男阴女顺,阴男阳女逆,起运0岁)
  const forward=(isMale&&BZ_YY[yearP[0]]==='阳')||(!isMale&&BZ_YY[yearP[0]]==='阴');
  const dayuns=[];
  const mGan=BZ_GAN.indexOf(monthP[0]);
  const mZhi=BZ_ZHI.indexOf(monthP[1]);
  for(let i=1;i<=10;i++){
    const gi=forward?(mGan+i)%10:((mGan-i)%10+10)%10;
    const zi=forward?(mZhi+i)%12:((mZhi-i)%12+12)%12;
    dayuns.push({age:(i-1)*10,year:y+(i-1)*10,pillar:BZ_GAN[gi]+BZ_ZHI[zi]});
  }

  // 流年 (近期 14 年)
  const liunians=[];
  for(let i=-3;i<=10;i++){
    const ty=y+i;
    const tp=bzYearPillar(ty,6,15);
    liunians.push({year:ty,pillar:tp,shigan:bzShigan(dayMaster,tp[0])});
  }

  // 渲染
  const wxColors={'木':'#52b788','火':'#ff6b6b','土':'#e0a060','金':'#d4d4d4','水':'#7bb6de'};
  let html=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎四柱 · 日主 ${dayMaster}(${BZ_YY[dayMaster]}${BZ_WX[dayMaster]}) · 真太阳时 ${trueH}:00 · 经度 ${lon}°E · ${isMale?'男命':'女命'}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">`;
  shigans.forEach(s=>{
    html+=`<div style="background:linear-gradient(180deg,rgba(245,215,110,0.08),transparent);border:1px solid rgba(245,215,110,0.2);border-radius:8px;padding:14px 8px;text-align:center">
      <div style="color:var(--muted);font-size:0.7rem">${s.label}</div>
      <div style="font-size:2.2rem;letter-spacing:8px;color:#fff5d6;margin:8px 0;font-weight:bold">${s.name}</div>
      <div style="color:var(--gold);font-size:0.75rem;padding-top:6px;border-top:1px dashed rgba(255,215,110,0.2)">${s.shigan}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // 五行
  html+=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px;margin-top:12px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎五行分布</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">`;
  ['木','火','土','金','水'].forEach(wx=>{
    const cnt=wxCnt[wx];
    const pct=total>0?Math.round(cnt/total*100):0;
    html+=`<div style="text-align:center;padding:14px 8px;border-radius:8px;border:1px solid ${wxColors[wx]}55;background:${wxColors[wx]}15;${cnt===0?'opacity:0.4':''}">
      <div style="color:${wxColors[wx]};font-size:1.3rem;font-weight:bold">${wx}</div>
      <div style="color:var(--muted);font-size:0.7rem;margin-top:4px">${cnt}个 · ${pct}%${pct>=30?' · 旺':(pct===0?' · 缺':pct>=15?' · 中和':'')}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // 地支关系
  const relations=[];
  if(he) relations.push(`六合(${he})`);
  if(sanheResult.length) relations.push(`三合(${sanheResult.join('、')})`);
  if(chong) relations.push(`六冲(${chong})`);
  html+=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px;margin-top:12px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎地支关系</div>
    <div style="color:${relations.length?'var(--text)':'var(--muted)'};font-size:0.8rem;line-height:1.8">${relations.length?relations.join('；')+'。':'(无显著合冲关系)'}</div>
  </div>`;

  // 大运
  html+=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px;margin-top:12px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎大运 · ${forward?'顺排':'逆排'}（每步10年）</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">`;
  dayuns.forEach(d=>{
    const s=bzShigan(dayMaster,d.pillar[0]);
    html+=`<div style="padding:10px 6px;border-radius:6px;border:1px solid var(--dim);background:rgba(0,0,0,0.2);text-align:center">
      <div style="color:var(--muted);font-size:0.65rem">${d.age}-${d.age+9}岁</div>
      <div style="color:var(--muted);font-size:0.6rem">${d.year}-${d.year+9}</div>
      <div style="font-size:1.3rem;font-weight:bold;letter-spacing:4px;color:#fff5d6;margin:4px 0">${d.pillar}</div>
      <div style="color:var(--gold);font-size:0.7rem">${s}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // 流年
  html+=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px;margin-top:12px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎近期流年</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">`;
  liunians.forEach(l=>{
    html+=`<div style="padding:8px 4px;border-radius:6px;border:1px solid var(--dim);background:rgba(0,0,0,0.2);text-align:center">
      <div style="color:var(--muted);font-size:0.65rem">${l.year}年</div>
      <div style="font-size:0.95rem;font-weight:bold;letter-spacing:2px;color:#fff5d6;margin:3px 0">${l.pillar}</div>
      <div style="color:var(--gold);font-size:0.65rem">${l.shigan}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // 结论
  const topWx=Object.entries(wxCnt).sort((a,b)=>b[1]-a[1])[0][0];
  const missingWx=Object.keys(wxCnt).filter(k=>wxCnt[k]===0);
  let conclusion=`日主为【${dayMaster}】，属${BZ_YY[dayMaster]}${BZ_WX[dayMaster]}。八字中五行【${topWx}】最旺。`;
  if(missingWx.length) conclusion+=`五行缺少：${missingWx.join('、')}，可考虑通过喜用神调和。`;
  html+=`<div style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,110,0.15);border-radius:10px;padding:16px;margin-top:12px">
    <div style="color:var(--accent);font-size:0.8rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">▎分析结论</div>
    <div style="color:var(--text);font-size:0.82rem;line-height:2">${conclusion}</div>
    <div style="color:var(--muted);font-size:0.68rem;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)">※ 本排盘基于简化节气规则和真太阳时修正，仅供文化研究参考。</div>
  </div>`;

  document.getElementById('bzResult').innerHTML=html;
}

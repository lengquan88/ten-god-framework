# ============================================================================
# 中华文明数字永生体 · CI/CD 流水线 v2.0
# ============================================================================
# GitHub Actions 工作流：
#   1. test    - 代码测试（lint + unit test）
#   2. build   - Docker 镜像构建
#   3. deploy  - 生产部署（仅 main 分支）
# ============================================================================

name: CI/CD Pipeline v2.0

on:
  push:
    branches: [main, develop]
    paths:
      - "demo_project/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: tengod-api
  MODULE_DIR: demo_project/tengod

jobs:
  # ── Lint 代码检查 ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check demo_project/tengod/ --select=E,F,W --ignore=E501,F401,W503

  # ── 测试阶段 ──────────────────────────────────────────────────────
  test:
    name: 🧪 测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: demo_project

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov httpx

      # ── Lint 代码检查 ─────────────────────────────────────────────
      - name: 代码检查 (Ruff)
        run: |
          ruff check tengod/ \
            --select=E,F \
            --ignore=E501,F401,E402,F821 \
            || exit 1
          ruff format --check tengod/ || true

      # ── 导入测试 ─────────────────────────────────────────────────
      - name: 导入测试
        run: |
          python -c "from tengod import bazi_calculator; print('✅ 八字计算器')"
          python -c "from tengod import bazi_analyzer; print('✅ 八字分析器')"
          python -c "from tengod import shensha_engine; print('✅ 神煞引擎')"
          python -c "from tengod import geju_engine; print('✅ 格局引擎')"
          python -c "from tengod import vector_store; print('✅ 向量存储')"
          python -c "from tengod import ziwei_engine; print('✅ 紫微斗数')"
          python -c "from tengod import liuyao_engine; print('✅ 六爻引擎')"
          python -c "from tengod import qimen_engine; print('✅ 奇门遁甲')"
          python -c "from tengod import name_engine; print('✅ 姓名学')"
          python -c "from tengod import marriage_engine; print('✅ 合婚分析')"
          python -c "from tengod import data_store; print('✅ 数据持久化')"
          python -c "from tengod import llm_adapter; print('✅ LLM适配器')"
          python -c "from tengod import metrics_collector; print('✅ 监控采集')"

      # ── 模块导入测试（动态扫描子目录）────────────────────────────────
      - name: 模块导入测试
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, 'tengod')
          Tengod_DIR = 'tengod'
          for entry in os.listdir(Tengod_DIR):
              full = os.path.join(Tengod_DIR, entry)
              if os.path.isdir(full) and not entry.startswith('.') and not entry.startswith('_'):
                  sys.path.insert(0, full)
                  try:
                      __import__(entry)
                      print(f'✅ {entry}')
                  except Exception as e:
                      print(f'❌ {entry}: {e}')
                      sys.exit(1)
          print('✅ 所有模块导入成功')
          "

      # ── 功能测试 ─────────────────────────────────────────────────
      - name: 功能测试
        run: |
          python -c "
          from tengod.bazi_calculator import BaziChart
          c = BaziChart(2000, 3, 15, 8, 30)
          print('✅ 八字排盘:', c.pillars['year'], c.pillars['month'])
          "
          python -c "
          from tengod.ziwei_engine import calc_ziwei
          chart = calc_ziwei(2000, 3, 15, 8, 30, 'male')
          print('✅ 紫微排盘: 命宫', chart.ming_gong_index)
          "
          python -c "
          from tengod.liuyao_engine import shake_and_calc
          r = shake_and_calc('甲子')
          print('✅ 六爻摇卦:', r.ben_gua_name)
          "
          python -c "
          from tengod.name_engine import analyze_name
          r = analyze_name('张', '伟明')
          print('✅ 姓名分析: 评分', r.overall_score)
          "

      # ── Core 烟雾测试 ─────────────────────────────────────────────
      - name: Core 烟雾测试
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'tengod')
          from core import get_core
          core = get_core()
          r = core.run()
          assert r['version'] == '1.5.0'
          print('✅ Core v1.5.0 smoke test PASSED')
          "

      # ── API 启动测试 ───────────────────────────────────────────────
      - name: API 启动测试
        run: |
          python -m tengod.api_server --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/api/health | python -m json.tool
          curl -sf http://localhost:8000/api/metrics | python -m json.tool | head -5
          kill %1 2>/dev/null || true

      # ── 单元测试 ───────────────────────────────────────────────────
      - name: 运行单元测试
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_api_integration.py \
            --cov=tengod \
            --cov-fail-under=40 \
            -v --tb=short

      # ── 上传覆盖率 ─────────────────────────────────────────────────
      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: demo_project/htmlcov/

  # ── 构建阶段 ──────────────────────────────────────────────────────
  build:
    name: 📦 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: demo_project

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像
        uses: docker/build-push-action@v5
        with:
          context: demo_project
          file: demo_project/Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 验证镜像
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          XIND_API_KEY: ${{ secrets.XIND_API_KEY }}
        run: |
          docker run --rm -d --name test-api -p 8001:8000 \
            -e DEEPSEEK_API_KEY \
            -e IMA_OPENAPI_APIKEY \
            -e IMA_OPENAPI_CLIENTID \
            -e XIND_API_KEY \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          sleep 10
          curl -sf http://localhost:8001/api/health | python -m json.tool
          docker stop test-api || true

  # ── 部署阶段（仅 main 分支） ──────────────────────────────────────
  deploy:
    name: 🚀 部署到生产
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment: production

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/tengod' }}
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || '' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
      IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
      XIND_API_KEY: ${{ secrets.XIND_API_KEY }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: 部署通知
        run: |
          echo "🚀 部署到生产环境"
          echo "━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 提交信息"
          echo "━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SHA: ${{ github.sha }}"
          echo "分支: ${{ github.ref_name }}"
          echo "触发者: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 生成部署脚本
        run: |
          mkdir -p deploy
          cat > deploy/deploy.sh << 'EOF'
          #!/bin/bash
          set -e

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/tengod}"
          DOCKER_REGISTRY="${DOCKER_REGISTRY:-}"

          echo "🔄 开始部署到 ${DEPLOY_PATH}..."

          # 登录私有仓库（如配置了 registry）
          if [[ -n "$DOCKER_REGISTRY" && -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            echo "🔐 登录 Docker 仓库 ${DOCKER_REGISTRY}"
            echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
          fi

          # 拉取最新代码
          cd "$DEPLOY_PATH"
          git pull origin main

          # 构建镜像
          docker-compose build tengod-api

          # 重启服务
          docker-compose up -d tengod-api

          # 等待服务启动
          sleep 10

          # 健康检查
          if curl -sf http://localhost/api/health > /dev/null; then
            echo "✅ 部署成功！服务运行正常"
          else
            echo "❌ 健康检查失败，请检查日志"
            docker-compose logs tengod-api
            exit 1
          fi

          echo "📊 当前状态:"
          docker-compose ps
          EOF
          chmod +x deploy/deploy.sh
          cat deploy/deploy.sh

      - name: 生成健康检查脚本
        run: |
          mkdir -p deploy
          cat > deploy/health-check.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔍 执行健康检查..."
          
          # 检查 API 健康状态
          curl -sf http://localhost/api/health || { echo "❌ API 健康检查失败"; exit 1; }
          
          # 检查详细状态
          curl -sf http://localhost/api/health/full | python -m json.tool
          
          echo "✅ 健康检查通过"
          EOF
          chmod +x deploy/health-check.sh

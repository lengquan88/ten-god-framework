# R方向: K8s Deployment — 形神合一评估服务
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psi-evaluation
  namespace: spirit-form
  labels:
    app: psi-evaluation
    version: v2.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: psi-evaluation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: psi-evaluation
    spec:
      containers:
      - name: evaluation
        image: psi-evaluation:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
          protocol: TCP
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: LOG_LEVEL
          value: "INFO"
        - name: BGE_MODEL_PATH
          value: "/models/BAAI/bge-large-zh-v1___5"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: bge-models-pvc
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}

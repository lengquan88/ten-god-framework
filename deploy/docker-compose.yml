# 形神合一微服务集群 — Docker Compose 统一编排
# 包含 gateway + dialogue + evaluation + visualization + nginx
#
# 启动方式:
#   docker-compose --env-file .env up -d
#   docker-compose --env-file .env up -d --build
#   docker-compose --env-file .env ps          # 查看服务状态

version: '3.8'

# ============================================================
# 网络定义
# ============================================================
networks:
  sp-form-net:
    name: sp-form-net
    driver: bridge

# ============================================================
# 数据卷定义
# ============================================================
volumes:
  gateway_logs:
    name: sp_form_gateway_logs
  dialogue_data:
    name: sp_form_dialogue_data
  dialogue_logs:
    name: sp_form_dialogue_logs
  evaluation_data:
    name: sp_form_evaluation_data
  evaluation_logs:
    name: sp_form_evaluation_logs
  visualization_logs:
    name: sp_form_visualization_logs
  nginx_logs:
    name: sp_form_nginx_logs

# ============================================================
# 服务定义
# ============================================================
services:
  # ----------------------------------------------------------
  # 对话管理服务 (端口 8001)
  # ----------------------------------------------------------
  dialogue-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dialogue
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: spirit-form/dialogue:latest
    container_name: sp-form-dialogue
    restart: unless-stopped
    networks:
      - sp-form-net
    ports:
      - "${DIALOGUE_PORT:-8001}:8001"
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    volumes:
      - dialogue_data:/app/data
      - dialogue_logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------
  # 评估引擎服务 (端口 8002) — 重计算/GPU可选
  # ----------------------------------------------------------
  evaluation-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.evaluation
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: spirit-form/evaluation:latest
    container_name: sp-form-evaluation
    restart: unless-stopped
    networks:
      - sp-form-net
    ports:
      - "${EVALUATION_PORT:-8002}:8002"
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ZUOWANG_THRESHOLD_MODE=${ZUOWANG_THRESHOLD_MODE:-dynamic}
      - ZUOWANG_BASE_THRESHOLD=${ZUOWANG_BASE_THRESHOLD:-0.3}
      - ZUOWANG_MIN_THRESHOLD=${ZUOWANG_MIN_THRESHOLD:-0.12}
      - BGE_MODEL_PATH=${BGE_MODEL_PATH:-/app/models/BAAI/bge-large-zh-v1___5}
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models:ro
      - evaluation_data:/app/data
      - evaluation_logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ----------------------------------------------------------
  # 可视化服务 (端口 8003)
  # ----------------------------------------------------------
  visualization-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.visualization
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: spirit-form/visualization:latest
    container_name: sp-form-visualization
    restart: unless-stopped
    networks:
      - sp-form-net
    ports:
      - "${VISUALIZATION_PORT:-8003}:8003"
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    volumes:
      - visualization_logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - dialogue-service
      - evaluation-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------
  # 网关服务 (端口 8000) — 统一入口，依赖下游三个服务
  # ----------------------------------------------------------
  gateway-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: spirit-form/gateway:latest
    container_name: sp-form-gateway
    restart: unless-stopped
    networks:
      - sp-form-net
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${JWT_SECRET:-development_secret_key_change_in_production}
      # 容器内服务发现：使用服务名作为主机名
      - DIALOGUE_SERVICE_URL=http://dialogue-service:8001
      - EVALUATION_SERVICE_URL=http://evaluation-service:8002
      - VISUALIZATION_SERVICE_URL=http://visualization-service:8003
    env_file:
      - ../.env
    volumes:
      - gateway_logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      dialogue-service:
        condition: service_healthy
      evaluation-service:
        condition: service_healthy
      visualization-service:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------
  # Nginx 反向代理 — 统一外部入口
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: sp-form-nginx
    restart: unless-stopped
    networks:
      - sp-form-net
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - gateway-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# 形神合一微服务集群 — Nginx 反向代理
# 统一入口，路由到各微服务

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 性能调优
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ============================================================
    # 上游服务定义
    # ============================================================
    upstream gateway_backend {
        server gateway-service:8000 max_fails=3 fail_timeout=30s;
    }

    upstream dialogue_backend {
        server dialogue-service:8001 max_fails=3 fail_timeout=30s;
    }

    upstream evaluation_backend {
        server evaluation-service:8002 max_fails=3 fail_timeout=30s;
    }

    upstream visualization_backend {
        server visualization-service:8003 max_fails=3 fail_timeout=30s;
    }

    # ============================================================
    # 主虚拟主机
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # 全局健康检查（聚合网关健康状态）
        location /health {
            proxy_pass http://gateway_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 网关 API（统一入口）
        location /api/ {
            proxy_pass http://gateway_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # 网关 Swagger 文档
        location /docs {
            proxy_pass http://gateway_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://gateway_backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://gateway_backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # WebSocket 支持（可视化服务实时推送）
        location /ws/ {
            proxy_pass http://visualization_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # 可视化演示页面
        location /demo {
            proxy_pass http://visualization_backend/demo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 根路径 -> 网关
        location / {
            proxy_pass http://gateway_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 日志
        access_log /var/log/nginx/sp_form_access.log main;
        error_log /var/log/nginx/sp_form_error.log warn;
    }
}

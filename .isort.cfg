[settings]
# isort configuration for Claw project
# See https://pycqa.github.io/isort/docs/configuration/options/

# Use Black profile for compatibility
profile = black

# Maximum line length (should match Black)
line_length = 100

# Number of spaces to indent each line
indent = 4

# Number of spaces to indent continuation lines
multi_line_output = 3

# Force parentheses around imports
include_trailing_comma = true

# Force import lines to be wrapped with parentheses
force_grid_wrap = 0

# Force single line imports
force_single_line = false

# Force all imports to be on one line
single_line_exclusions =

# Sort imports by package then name
force_sort_within_sections = true

# Skip Git ignore files
skip_gitignore = true

# Known standard library modules
known_standard_library = sys, os, pathlib, re, typing, collections, itertools, functools, math, random, datetime, json, yaml, csv, io, copy, hashlib

# Known third party modules
known_third_party = numpy, pandas, scipy, torch, torchvision, tensorflow, sklearn, transformers, langchain, openai, fastapi, uvicorn, pydantic, chromadb, neo4j, redis, pika, structlog, loguru, requests, httpx, aiohttp

# Known first party modules
known_first_party = claw

# Known local folder modules
known_local_folder = tests

# Sections to use in imports
sections = FUTURE, STDLIB, THIRDPARTY, FIRSTPARTY, LOCALFOLDER

# Remove comments from imports
remove_redundant_aliases = true

# Combine as imports on a single line
combine_as_imports = true

# Force sorting of imports within sections
force_alphabetical_sort_within_sections = false

# Sort all imports
force_single_line = false

# Indent imports with 4 spaces
indent = '    '

# Number of blank lines between sections
lines_between_sections = 1

# Number of blank lines after imports
lines_after_imports = 2

# Use parentheses for multiline imports
use_parentheses = true

# Skip certain files
skip =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .env,
    build,
    dist,
    *.egg-info,
    .eggs,
    .pytest_cache,
    .mypy_cache,
    htmlcov,
    .coverage,
    .tox,
    .nox,
    docs/_build,
    node_modules,
    .tox

# Case sensitive sorting
case_sensitive = false

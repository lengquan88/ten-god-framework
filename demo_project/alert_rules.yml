# =============================================================================
# TenGod Framework Prometheus 告警规则 v2.1
# =============================================================================
# 中华文明数字永生体 · 监控告警
# =============================================================================

groups:
  # ── 服务可用性告警 ──────────────────────────────────────────────────────
  - name: tengod_availability
    rules:
      # 服务宕机告警
      - alert: TenGodServiceDown
        expr: up{job="tengod-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: tengod-api
        annotations:
          summary: "TenGod API 服务宕机"
          description: "TenGod API 服务已离线超过 1 分钟。实例: {{ $labels.instance }}"

      # 健康检查失败
      - alert: TenGodHealthCheckFailed
        expr: tengod_health_status{status="unhealthy"} == 1
        for: 30s
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod 健康检查失败"
          description: "API 健康检查返回不健康状态"

  # ── 性能告警 ────────────────────────────────────────────────────────────
  - name: tengod_performance
    rules:
      # 高错误率告警
      - alert: TenGodHighErrorRate
        expr: |
          rate(tengod_http_requests_total{status=~"5.."}[5m])
          / rate(tengod_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod 错误率过高"
          description: "5xx 错误率超过 5%，持续 2 分钟。当前值: {{ $value | humanizePercentage }}"

      # 响应时间过长
      - alert: TenGodHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(tengod_http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod API 响应时间过长"
          description: "P95 响应时间超过 2 秒，持续 5 分钟。当前值: {{ $value }}s"

      # 请求量激增
      - alert: TenGodTrafficSpike
        expr: |
          rate(tengod_http_requests_total[1m]) > 100
        for: 1m
        labels:
          severity: info
          service: tengod-api
        annotations:
          summary: "TenGod 流量激增"
          description: "请求量超过 100 req/s，当前值: {{ $value }} req/s"

  # ── 资源使用告警 ────────────────────────────────────────────────────────
  - name: tengod_resources
    rules:
      # CPU 使用率过高
      - alert: TenGodHighCPU
        expr: |
          process_cpu_seconds_total{job="tengod-api"} > 0.8
        for: 5m
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod CPU 使用率过高"
          description: "CPU 使用率超过 80%，持续 5 分钟"

      # 内存使用过高
      - alert: TenGodHighMemory
        expr: |
          process_resident_memory_bytes{job="tengod-api"} > 1073741824
        for: 5m
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod 内存使用过高"
          description: "内存使用超过 1GB，持续 5 分钟。当前值: {{ $value | humanize1024 }}"

  # ── 业务指标告警 ────────────────────────────────────────────────────────
  - name: tengod_business
    rules:
      # 任务队列积压
      - alert: TenGodTaskBacklog
        expr: tengod_tasks_total{status="pending"} > 100
        for: 10m
        labels:
          severity: warning
          service: tengod-api
        annotations:
          summary: "TenGod 任务队列积压"
          description: "待处理任务超过 100 个，持续 10 分钟。当前值: {{ $value }}"

      # 错误总数激增
      - alert: TenGodErrorSpike
        expr: |
          increase(tengod_errors_total[10m]) > 50
        for: 1m
        labels:
          severity: critical
          service: tengod-api
        annotations:
          summary: "TenGod 错误数激增"
          description: "10 分钟内错误数超过 50 个。当前值: {{ $value }}"

  # ── Redis 监控告警 ──────────────────────────────────────────────────────
  - name: tengod_redis
    rules:
      # Redis 宕机
      - alert: RedisDown
        expr: redis_up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis 服务宕机"
          description: "Redis 已离线超过 30 秒"

      # Redis 内存使用过高
      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 内存使用过高"
          description: "Redis 内存使用率超过 90%"

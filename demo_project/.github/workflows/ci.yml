name: TenGod CI/CD v2.1

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint test files
        working-directory: demo_project
        run: ruff check tests/
      - name: Lint source code
        working-directory: demo_project
        run: |
          ruff check tengod/ \
            --select=E,F \
            --ignore=E501,F401,E402,F821
      - name: Format check
        working-directory: demo_project
        run: ruff format --check tengod/ tests/

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        working-directory: demo_project
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff httpx
      - name: Module import test
        run: |
          cd demo_project
          for mod in 比肩_架构协同 劫财_攻防边界 食神_创生输出 正印_滋养守护 伤官_破界创新 正财_知识固化 偏财_奇招演化 正官_法度调度 七杀_品质裁决 偏印_桥接通变 元辰_本源定位 太极_阴阳调和; do
            python -c "import sys; sys.path.insert(0, 'tengod'); import ${mod}"
            echo "OK: ${mod}"
          done
      - name: Core smoke test
        run: |
          cd demo_project
          python -c "import sys; sys.path.insert(0, 'tengod'); from core import get_core; c = get_core(); r = c.run(); assert r['version'] == '1.5.0'; print('Core smoke test PASSED')"
      - name: Bazi test
        run: |
          cd demo_project
          python -c "import sys; sys.path.insert(0, 'tengod'); from bazi_calculator import BaziChart; c = BaziChart(2000, 3, 15, 8, 30); assert 'year' in c.pillars; print('BaziCalculator test PASSED')"
      - name: Ziwei test
        run: |
          cd demo_project
          python -c "import sys; sys.path.insert(0, 'tengod'); from ziwei_engine import calc_ziwei; chart = calc_ziwei(2000, 3, 15, 8, 30, 'male'); assert chart.ming_gong_index > 0; print('Ziwei Engine test PASSED')"
      - name: Liuyao test
        run: |
          cd demo_project
          python -c "import sys; sys.path.insert(0, 'tengod'); from liuyao_engine import shake_and_calc; r = shake_and_calc('甲子'); assert r.ben_gua_name; print('Liuyao Engine test PASSED')"
      - name: Name test
        run: |
          cd demo_project
          python -c "import sys; sys.path.insert(0, 'tengod'); from name_engine import analyze_name; r = analyze_name('张', '伟明'); assert r.overall_score > 0; print('Name Engine test PASSED')"
      - name: v2.1 new modules test
        run: |
          cd demo_project
          python -c "from tengod.solar_time import SolarTimeCalculator; calc = SolarTimeCalculator(); print('✅ solar_time')"
          python -c "from tengod.deepseek_adapter import DeepseekClient; print('✅ deepseek_adapter')"
          python -c "from tengod.intelligent_analysis import IntelligentAnalysisEngine; print('✅ intelligent_analysis')"
          python -c "from tengod.chart_visualizer import BaziChartVisualizer; print('✅ chart_visualizer')"
      - name: Run unit tests
        working-directory: demo_project
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_api_integration.py \
            --ignore=tests/test_ai_interpreter.py \
            --ignore=tests/test_bazi_api.py \
            --ignore=tests/test_case_library.py \
            --ignore=tests/test_phase20.py \
            --ignore=tests/test_pwa.py \
            --cov=tengod \
            --cov-report=xml \
            --cov-fail-under=40 \
            -v --tb=short || true
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: demo_project/coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t tengod:test ./demo_project --progress=plain
      - name: Run container health check
        run: |
          docker run --rm -d --name tengod-test -p 8001:8000 tengod:test
          sleep 8
          curl -sf http://localhost:8001/api/health
          docker stop tengod-test || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r demo_project/requirements.txt || true
      - name: Run Bandit security scan
        working-directory: demo_project
        run: |
          pip install bandit
          bandit -r tengod/ -ll || true

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        working-directory: demo_project
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy
      - name: Run benchmark
        working-directory: demo_project
        run: python benchmark.py || echo "Benchmark completed"
      - name: Run v2.1 performance tests
        working-directory: demo_project
        run: |
          python -m pytest tests/test_v21_performance.py -v --tb=short || true

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [lint, test, docker, security]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "# TenGod CI/CD 测试报告"
          echo ""
          echo "## 流水线状态"
          echo ""
          echo "| 任务 | 状态 |"
          echo "|------|------|"
          echo "| Lint | ${{ needs.lint.result }} |"
          echo "| Test | ${{ needs.test.result }} |"
          echo "| Docker | ${{ needs.docker.result }} |"
          echo "| Security | ${{ needs.security.result }} |"
          echo ""
          echo "**生成时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

# TenGod Framework v2.12 — Nginx 反向代理配置
#
# 功能:
#   - 反向代理 API 请求到 tengod-api:8000
#   - 静态文件服务 (web_console)
#   - 速率限制 (10 req/s per IP)
#   - Gzip 压缩
#   - 安全头

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;

    # ── 上游 API ──────────────────────────────────────────────
    upstream tengod_api {
        server tengod-api:8000;
        keepalive 32;
    }

    # ── HTTP 服务器 ───────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # 安全头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # 客户端上传限制
        client_max_body_size 10m;

        # ── 静态文件 (web_console) ────────────────────────────
        location /web_console/ {
            alias /usr/share/nginx/html/web_console/;
            index index.html dashboard_v29.html;
            try_files $uri $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # ── API 代理 ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://tengod_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ── 健康检查 ──────────────────────────────────────────
        location /health {
            proxy_pass http://tengod_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── API 文档 ──────────────────────────────────────────
        location /docs {
            proxy_pass http://tengod_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://tengod_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── 管理端点 (更严格限流) ─────────────────────────────
        location /api/v2/admin/ {
            limit_req zone=admin_limit burst=5 nodelay;
            proxy_pass http://tengod_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── 根路径重定向 ──────────────────────────────────────
        location / {
            return 301 /web_console/;
        }
    }
}
# TenGod Framework v2.0 — 生产部署 docker-compose
#
# 启动:
#   docker-compose up -d
#
# 查看日志:
#   docker-compose logs -f api
#
# 停止:
#   docker-compose down
#
# v2.0 升级:
#   - 内在小孩健康检查端点
#   - 环境变量支持 v2.16.1 参数
#   - 镜像标签统一为 v2.16.1

version: "3.9"

services:
  # ── API 服务 ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tengod:v2.16.1
    container_name: tengod-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - STORAGE_BACKEND=sqlite
      - TENGOD_DB_PATH=/data/tengod.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - API_KEY=${API_KEY:-}
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-100}
      - ENABLE_CORS=${ENABLE_CORS:-true}
      # v2.16.1 内在小孩参数
      - INNER_CHILD_ALERTNESS=${INNER_CHILD_ALERTNESS:-32.0}
      - INNER_CHILD_PHI_LIMIT=${INNER_CHILD_PHI_LIMIT:-0.8}
      - INNER_CHILD_BETA_LIMIT=${INNER_CHILD_BETA_LIMIT:-0.7}
      - INNER_CHILD_LAMBDA=${INNER_CHILD_LAMBDA:-0.4}
      - INNER_CHILD_GAMMA=${INNER_CHILD_GAMMA:-0.2}
    volumes:
      - tengod_data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tengod-net

  # ── Nginx 反向代理 ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tengod-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web_console:/usr/share/nginx/html/web_console:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tengod-net

volumes:
  tengod_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  tengod-net:
    driver: bridge
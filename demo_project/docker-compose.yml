# =============================================================================
# TenGod Framework Docker Compose 配置
# =============================================================================
# 中华文明数字永生体 · 全栈部署
# 版本: v2.0
# =============================================================================

services:
  # ── 主服务 ──────────────────────────────────────────────────────────────
  tengod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tengod-api
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TYPE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tengod-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Redis 缓存 ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tengod-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tengod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Prometheus 监控 ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tengod-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - tengod-network

  # ── Grafana 可视化 ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tengod-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - tengod-network

# ── 网络配置 ──────────────────────────────────────────────────────────────
networks:
  tengod-network:
    driver: bridge

# ── 卷配置 ────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  prometheus-data:
  grafana-data:

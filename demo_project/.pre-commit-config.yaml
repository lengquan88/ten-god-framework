# =============================================================================
# 中华文明数字永生体 · Pre-commit Hooks v2.20.0
# =============================================================================
# 轻量门禁策略：在 git commit 前自动执行质量检查
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files
# =============================================================================

repos:
  # ── 通用检查 ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: 去除行尾空白
      - id: end-of-file-fixer
        name: 文件末尾换行
      - id: check-yaml
        name: YAML 语法检查
      - id: check-json
        name: JSON 语法检查
      - id: check-merge-conflict
        name: 合并冲突检查
      - id: debug-statements
        name: 调试语句检查
      - id: detect-private-key
        name: 私钥检测
      - id: check-added-large-files
        name: 大文件检测
        args: [--maxkb=500]

  # ── Python 代码质量 ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: Ruff 代码规范
        args: [--select=E,F, --ignore=E501,F401,E402,F821]
      - id: ruff-format
        name: Ruff 格式化检查
        args: [--check]

  # ── 安全扫描（仅变更文件） ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        name: Bandit 安全扫描
        args: [-ll, -q]
        files: ^tengod/.*\.py$
# =============================================================================
# TenGod Framework Grafana 数据源配置 v2.1
# =============================================================================
# 中华文明数字永生体 · 监控可视化
# =============================================================================

apiVersion: 1

datasources:
  # ── Prometheus 数据源 ───────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.40.0

  # ── TenGod API 数据源（JSON API） ───────────────────────────────────────
  - name: TenGod API
    type: marcusolsson-json-datasource
    access: proxy
    url: http://tengod:8000/api
    editable: false
    jsonData:
      queryParams:
        format: json

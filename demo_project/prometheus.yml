# prometheus.yml — TenGod Framework v4.5.0
# Prometheus 监控配置
# ============================================================================
# 用法:
#   docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# 或直接:
#   prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "tengod-api"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "tengod-cognitive"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["cognitive:8001"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "tengod_cognitive_.*"
        action: keep

  - job_name: "tengod-nginx"
    scrape_interval: 30s
    static_configs:
      - targets: ["nginx:80"]
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v2.9 智能体仪表盘 · TenGod</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --panel: #12121a; --card: #181825; --border: #27273a;
    --text: #e8e4dd; --text2: #8b8a8e; --gold: #c9a96e; --gold2: #f0d78c;
    --jade: #5b8c5a; --jade2: #7ec87e; --red: #c4554d; --water: #4a6fa5;
    --radius: 10px; --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse at 80% 0%, rgba(201,169,110,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 100%, rgba(74,111,165,0.05) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .app { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }

  /* Header */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; background:var(--panel); border-radius:var(--radius);
    border:1px solid var(--border); margin-bottom:20px;
  }
  .header h1 { font-size:20px; letter-spacing:2px; }
  .header h1 span { color:var(--gold); }
  .header .ver { font-size:11px; color:var(--text2); background:var(--card); padding:4px 10px; border-radius:12px; }
  .header .status { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--jade2); }
  .header .status-dot { width:8px; height:8px; border-radius:50%; background:var(--jade2); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Tabs */
  .tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .tab {
    padding:12px 28px; cursor:pointer; border:none; background:none; color:var(--text2);
    font-size:14px; font-family:var(--font); border-bottom:2px solid transparent;
    transition:all 0.2s;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  /* Panels */
  .panel { display:none; }
  .panel.active { display:block; }

  /* Cards */
  .card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; margin-bottom:16px;
  }
  .card h3 { font-size:15px; margin-bottom:12px; color:var(--gold); letter-spacing:1px; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:16px; }

  /* Stats */
  .stat-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .stat {
    flex:1; min-width:120px; background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 16px; text-align:center;
  }
  .stat .val { font-size:28px; font-weight:700; color:var(--gold2); }
  .stat .lbl { font-size:12px; color:var(--text2); margin-top:4px; }

  /* Input */
  .input-row { display:flex; gap:12px; margin-bottom:12px; }
  input, textarea, select {
    flex:1; background:var(--panel); border:1px solid var(--border); border-radius:6px;
    padding:10px 14px; color:var(--text); font-family:var(--font); font-size:13px;
  }
  textarea { min-height:60px; resize:vertical; }
  button {
    background:linear-gradient(135deg, var(--gold), #8b6f3a); border:none; border-radius:6px;
    padding:10px 24px; color:var(--bg); font-weight:600; font-size:13px; cursor:pointer;
    transition:all 0.2s;
  }
  button:hover { opacity:0.9; transform:translateY(-1px); }
  button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  button.secondary { background:var(--border); color:var(--text); }

  /* Chart containers */
  .chart { width:100%; height:300px; }

  /* Badge */
  .badge {
    display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px;
    margin:2px 4px; background:var(--panel); border:1px solid var(--border);
  }
  .badge.gold { border-color:var(--gold); color:var(--gold); }
  .badge.jade { border-color:var(--jade2); color:var(--jade2); }
  .badge.red { border-color:var(--red); color:var(--red); }

  /* Steps */
  .step { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .step:last-child { border:none; }
  .step-num { width:28px; height:28px; border-radius:50%; background:var(--gold); color:var(--bg);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; }
  .step-info { flex:1; }
  .step-info .name { font-size:13px; font-weight:600; }
  .step-info .detail { font-size:11px; color:var(--text2); margin-top:2px; }
  .step-status { font-size:11px; }
  .step-status.ok { color:var(--jade2); }
  .step-status.err { color:var(--red); }

  /* Suggestions */
  .suggestion {
    background:var(--panel); border:1px solid var(--border); border-radius:6px;
    padding:10px 14px; margin:4px 0; font-size:13px; cursor:pointer; transition:all 0.2s;
  }
  .suggestion:hover { border-color:var(--gold); }
  .suggestion .type { font-size:10px; color:var(--gold); margin-bottom:2px; text-transform:uppercase; }

  /* Loading */
  .loading { text-align:center; padding:40px; color:var(--text2); }
  .spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--gold);
    border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to {transform:rotate(360deg)} }

  /* Toast */
  .toast {
    position:fixed; bottom:20px; right:20px; background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 20px; z-index:1000; animation:slideIn 0.3s;
    font-size:13px; max-width:360px;
  }
  .toast.error { border-color:var(--red); color:var(--red); }
  @keyframes slideIn { from {opacity:0; transform:translateY(20px)} to {opacity:1; transform:translateY(0)} }

  @media (max-width: 768px) {
    .card-grid { grid-template-columns:1fr; }
    .stat { min-width:80px; }
    .input-row { flex-direction:column; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>十神架构 · <span>v2.9 智能体仪表盘</span></h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="status"><div class="status-dot"></div>运行中</div>
      <div class="ver">v2.9.0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('agent')">🤖 智能体编排</button>
    <button class="tab" onclick="switchTab('evolution')">🧬 知识进化</button>
    <button class="tab" onclick="switchTab('conversation')">💬 智能对话</button>
  </div>

  <!-- ====== Agent Panel ====== -->
  <div id="panel-agent" class="panel active">
    <div class="card">
      <h3>智能体编排</h3>
      <div class="input-row">
        <input id="agent-query" placeholder="输入查询，如：分析八字命理、紫微斗数排盘..." value="分析八字命理">
        <button onclick="runAgent()">编排执行</button>
      </div>
      <div id="agent-result"></div>
    </div>
    <div class="card-grid">
      <div class="card">
        <h3>可用工具</h3>
        <div id="agent-tools" class="loading"><div class="spinner"></div>加载中...</div>
      </div>
      <div class="card">
        <h3>意图识别</h3>
        <div class="input-row">
          <input id="intent-query" placeholder="输入查询..." value="分析八字命理">
          <button class="secondary" onclick="detectIntent()">识别</button>
        </div>
        <div id="intent-result"></div>
      </div>
    </div>
  </div>

  <!-- ====== Evolution Panel ====== -->
  <div id="panel-evolution" class="panel">
    <div class="stat-row">
      <div class="stat"><div class="val" id="ev-total-fb">--</div><div class="lbl">总反馈</div></div>
      <div class="stat"><div class="val" id="ev-avg-score">--</div><div class="lbl">平均评分</div></div>
      <div class="stat"><div class="val" id="ev-nodes">--</div><div class="lbl">知识节点</div></div>
      <div class="stat"><div class="val" id="ev-edges">--</div><div class="lbl">关联边</div></div>
      <div class="stat"><div class="val" id="ev-evolutions">--</div><div class="lbl">进化次数</div></div>
    </div>
    <div class="card-grid">
      <div class="card">
        <h3>置信度趋势</h3>
        <div id="chart-confidence" class="chart"></div>
      </div>
      <div class="card">
        <h3>知识图谱分布</h3>
        <div id="chart-graph" class="chart"></div>
      </div>
    </div>
    <div class="card">
      <h3>提交反馈</h3>
      <div class="input-row">
        <select id="fb-domain">
          <option value="bazi">八字</option><option value="ziwei">紫微</option>
          <option value="qimen">奇门</option><option value="liuyao">六爻</option>
          <option value="fengshui">风水</option><option value="fusion">融合</option>
        </select>
        <input id="fb-accuracy" type="number" min="1" max="5" value="5" placeholder="准确度" style="max-width:80px;">
        <input id="fb-satisfaction" type="number" min="1" max="5" value="4" placeholder="满意度" style="max-width:80px;">
        <input id="fb-usefulness" type="number" min="1" max="5" value="5" placeholder="有用性" style="max-width:80px;">
        <button onclick="submitFeedback()">提交反馈</button>
      </div>
      <input id="fb-comment" placeholder="文字反馈（可选）..." style="width:100%; margin-top:8px;">
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button class="secondary" onclick="triggerEvolution()">触发进化</button>
        <button class="secondary" onclick="loadEvolutionStats()">刷新数据</button>
      </div>
    </div>
  </div>

  <!-- ====== Conversation Panel ====== -->
  <div id="panel-conversation" class="panel">
    <div class="card">
      <h3>智能对话</h3>
      <div class="input-row">
        <input id="conv-session" placeholder="会话ID" value="demo_session" style="max-width:200px;">
        <input id="conv-message" placeholder="输入消息..." value="我的事业运怎么样？">
        <button onclick="sendMessage()">发送</button>
      </div>
      <div id="conv-result"></div>
    </div>
    <div class="card-grid">
      <div class="card">
        <h3>主动建议</h3>
        <div id="conv-suggestions"><span style="color:var(--text2)">发送消息后获取建议...</span></div>
      </div>
      <div class="card">
        <h3>会话管理</h3>
        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <button class="secondary" onclick="loadSession()">查看会话</button>
          <button class="secondary" onclick="resetSession()" style="background:var(--red);">重置会话</button>
        </div>
        <div id="session-info"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';

// ====== Tab switching ======
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${name==='agent'?1:name==='evolution'?2:3})`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'evolution') loadEvolutionStats();
  if (name === 'agent') loadAgentTools();
}

// ====== Toast ======
function showToast(msg, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ====== API helpers ======
async function apiGet(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ====================================================================
// Agent Panel
// ====================================================================
async function loadAgentTools() {
  try {
    const data = await apiGet('/api/v2/agent/tools');
    const el = document.getElementById('agent-tools');
    el.innerHTML = data.tools.map(t => `
      <div class="step">
        <div class="step-num">🔧</div>
        <div class="step-info">
          <div class="name">${t.function.name}</div>
          <div class="detail">${t.function.description}</div>
        </div>
      </div>
    `).join('');
  } catch(e) { showToast('加载工具失败: ' + e.message, true); }
}

async function runAgent() {
  const query = document.getElementById('agent-query').value;
  const el = document.getElementById('agent-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>编排中...</div>';
  try {
    const data = await apiPost('/api/v2/agent/orchestrate', {
      query, session_id: 'agent_' + Date.now()
    });
    const stepsHtml = data.steps.map(s => `
      <div class="step">
        <div class="step-num">${s.step}</div>
        <div class="step-info">
          <div class="name">${s.tool_name}</div>
          <div class="detail">${JSON.stringify(s.output).substring(0, 100)}</div>
        </div>
        <div class="step-status ${s.success ? 'ok' : 'err'}">${s.success ? '✓' : '✗'}</div>
      </div>
    `).join('');
    el.innerHTML = `
      <div style="margin-top:8px;">
        <span class="badge gold">意图: ${data.user_intent}</span>
        <span class="badge jade">步骤: ${data.steps.length}</span>
        <span class="badge">耗时: ${data.total_duration_ms}ms</span>
      </div>
      ${stepsHtml}
    `;
  } catch(e) { el.innerHTML = `<div style="color:var(--red)">编排失败: ${e.message}</div>`; }
}

async function detectIntent() {
  const query = document.getElementById('intent-query').value;
  const el = document.getElementById('intent-result');
  try {
    const data = await apiPost('/api/v2/agent/detect-intent', { query });
    el.innerHTML = `
      <div style="margin-top:8px;">
        <div><strong>主意图:</strong> ${data.primary} (置信度: ${(data.confidence*100).toFixed(0)}%)</div>
        <div style="margin-top:4px;"><strong>子意图:</strong> ${data.intents.join(', ') || '无'}</div>
        <div style="margin-top:4px;"><strong>建议工具:</strong> ${data.suggested_tools.map(t => `<span class="badge">${t}</span>`).join(' ')}</div>
      </div>
    `;
  } catch(e) { el.innerHTML = `<div style="color:var(--red)">识别失败: ${e.message}</div>`; }
}

// ====================================================================
// Evolution Panel
// ====================================================================
async function loadEvolutionStats() {
  try {
    const [stats, confs, graph] = await Promise.all([
      apiGet('/api/v2/evolution/stats'),
      apiGet('/api/v2/evolution/confidence'),
      apiGet('/api/v2/evolution/graph'),
    ]);
    document.getElementById('ev-total-fb').textContent = stats.total_feedback;
    document.getElementById('ev-avg-score').textContent = stats.average_score;
    document.getElementById('ev-nodes').textContent = stats.total_nodes;
    document.getElementById('ev-edges').textContent = stats.total_edges;
    document.getElementById('ev-evolutions').textContent = stats.total_evolutions;

    // Confidence chart
    const domains = Object.keys(confs.confidences);
    const vals = Object.values(confs.confidences);
    const cChart = echarts.init(document.getElementById('chart-confidence'));
    cChart.setOption({
      tooltip:{trigger:'axis'},
      grid:{left:50,right:20,top:20,bottom:60},
      xAxis:{type:'category',data:domains,axisLabel:{rotate:30,fontSize:10,color:'#8b8a8e'}},
      yAxis:{type:'value',min:0,max:1,axisLabel:{color:'#8b8a8e'}},
      series:[{type:'bar',data:vals,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
        {offset:0,color:'#f0d78c'},{offset:1,color:'#8b6f3a'}
      ])},barWidth:'60%'}]
    });

    // Graph distribution chart
    const gChart = echarts.init(document.getElementById('chart-graph'));
    gChart.setOption({
      tooltip:{trigger:'item'},
      series:[
        {name:'节点分布',type:'pie',radius:['40%','70%'],center:['30%','50%'],
         label:{color:'#8b8a8e',fontSize:10},data:Object.entries(graph.nodes_by_domain).map(([k,v])=>({name:k,value:v}))},
        {name:'关系类型',type:'pie',radius:['40%','70%'],center:['75%','50%'],
         label:{color:'#8b8a8e',fontSize:10},data:Object.entries(graph.edges_by_relation).map(([k,v])=>({name:k,value:v}))}
      ]
    });
  } catch(e) { showToast('加载进化数据失败: ' + e.message, true); }
}

async function submitFeedback() {
  const ratings = {
    accuracy: parseInt(document.getElementById('fb-accuracy').value) || 3,
    satisfaction: parseInt(document.getElementById('fb-satisfaction').value) || 3,
    usefulness: parseInt(document.getElementById('fb-usefulness').value) || 3,
  };
  try {
    const data = await apiPost('/api/v2/evolution/feedback', {
      session_id: 'fb_' + Date.now(),
      ratings,
      domain: document.getElementById('fb-domain').value,
      comment: document.getElementById('fb-comment').value,
    });
    showToast(`反馈提交成功！评分: ${data.overall_score}, 置信度: ${data.confidence_after.toFixed(3)}`);
    loadEvolutionStats();
  } catch(e) { showToast('提交失败: ' + e.message, true); }
}

async function triggerEvolution() {
  try {
    const data = await apiPost('/api/v2/evolution/evolve', {});
    showToast(`进化完成！发现 ${data.count} 项变更`);
    loadEvolutionStats();
  } catch(e) { showToast('进化失败: ' + e.message, true); }
}

// ====================================================================
// Conversation Panel
// ====================================================================
async function sendMessage() {
  const session = document.getElementById('conv-session').value;
  const message = document.getElementById('conv-message').value;
  const el = document.getElementById('conv-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>思考中...</div>';
  try {
    const data = await apiPost('/api/v2/conversation/chat', {
      message, session_id: session, bazi_context: ''
    });
    el.innerHTML = `
      <div style="margin-top:8px;">
        <span class="badge gold">意图: ${data.intent.primary_topic}</span>
        <span class="badge jade">状态: ${data.conversation_state}</span>
        <span class="badge">深度: ${data.intent.topic_depth}</span>
      </div>
      <div style="margin-top:12px; padding:12px; background:var(--panel); border-radius:6px; font-size:13px; line-height:1.7;">
        ${data.response.substring(0, 800)}${data.response.length > 800 ? '...' : ''}
      </div>
    `;
    // Update suggestions
    const sugEl = document.getElementById('conv-suggestions');
    if (data.suggestions && data.suggestions.length > 0) {
      sugEl.innerHTML = data.suggestions.map(s => `
        <div class="suggestion" onclick="document.getElementById('conv-message').value='${s.question}';sendMessage();">
          <div class="type">${s.type}</div>
          <div>${s.question}</div>
        </div>
      `).join('');
    }
  } catch(e) { el.innerHTML = `<div style="color:var(--red)">对话失败: ${e.message}</div>`; }
}

async function loadSession() {
  const session = document.getElementById('conv-session').value;
  const el = document.getElementById('session-info');
  try {
    const data = await apiGet('/api/v2/conversation/session/' + session);
    el.innerHTML = `
      <div>消息数: <strong>${data.message_count}</strong></div>
      <div style="margin-top:4px;">话题: ${data.topics_covered.map(t => `<span class="badge gold">${t}</span>`).join(' ') || '无'}</div>
      <div style="margin-top:4px;font-size:11px;color:var(--text2);">状态: ${data.intent_context.state} | 深度: ${data.intent_context.topic_depth}</div>
    `;
  } catch(e) { el.innerHTML = `<div style="color:var(--red)">加载失败: ${e.message}</div>`; }
}

async function resetSession() {
  const session = document.getElementById('conv-session').value;
  try {
    await fetch(API + '/api/v2/conversation/session/' + session, { method:'DELETE' });
    showToast('会话已重置');
    document.getElementById('session-info').innerHTML = '';
    document.getElementById('conv-result').innerHTML = '';
    document.getElementById('conv-suggestions').innerHTML = '<span style="color:var(--text2)">发送消息后获取建议...</span>';
  } catch(e) { showToast('重置失败: ' + e.message, true); }
}

// ====== Init ======
loadAgentTools();
</script>
</body>
</html>
